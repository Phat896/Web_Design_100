<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <radialGradient id="space-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#020915"/>
      <stop offset="70%" stop-color="#01040a"/>
      <stop offset="100%" stop-color="#000103"/>
    </radialGradient>
    
    <!-- Hologram Glow -->
    <radialGradient id="holo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0f0" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#00a0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .star { fill: #ffffff; opacity: 0.3; animation: twinkle 4s infinite ease-in-out; }
    
    /* Hologram floating and pulsing animations */
    .holo-float {
      animation: holoFloat 5s infinite ease-in-out;
    }
    
    .holo-spin {
      transform-origin: 520px 180px;
      animation: holoSpin 20s infinite linear;
    }
    
    .pulse-indicator {
      animation: pulseInd 2s infinite ease-in-out;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }
    @keyframes holoFloat {
      0%, 100% { transform: translateY(0px); opacity: 0.85; }
      50% { transform: translateY(-8px); opacity: 1.0; }
    }
    @keyframes holoSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulseInd {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.9; }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#space-bg)" />

  <!-- Stars -->
  <circle cx="90" cy="70" r="1" class="star" />
  <circle cx="280" cy="50" r="1.5" class="star" style="animation-delay: 1s;" />
  <circle cx="700" cy="90" r="1.2" class="star" style="animation-delay: 2s;" />
  <circle cx="720" cy="300" r="1" class="star" style="animation-delay: 3s;" />

  <!-- Technical grid lines at bottom (Floor) -->
  <g opacity="0.08">
    <path d="M 0,400 L 800,400 M 0,420 L 800,420 M 0,440 L 800,440" stroke="#00f0f0" stroke-width="1" />
    <path d="M 100,400 L 50,450 M 200,400 L 170,450 M 300,400 L 290,450 M 400,400 L 410,450 M 500,400 L 530,450 M 600,400 L 650,450 M 700,400 L 770,450" stroke="#00f0f0" stroke-width="1" />
  </g>

  <!-- Silhouette of Room / Desk / Operator (Left side) -->
  <g transform="translate(0, 50)">
    <!-- Desk silhouette -->
    <path d="M 0,330 L 280,330 L 250,380 L 0,380 Z" fill="#060f1c" stroke="#00a0ff" stroke-width="1.5" />
    
    <!-- Cyber Chair profile -->
    <path d="M 80,330 L 110,240 L 140,240 L 120,330 Z" fill="#03080f" />
    <path d="M 70,380 L 100,380 L 110,330 L 80,330 Z" fill="#03080f" />

    <!-- Operator / Researcher silhouette sitting -->
    <!-- Head, torso, arms reaching desk -->
    <path d="M 140,195 C 140,185 148,180 155,180 C 162,180 170,185 170,195 C 170,205 162,210 155,210 C 148,210 140,205 140,195 Z" fill="#03080f" />
    <!-- Torso -->
    <path d="M 130,225 C 130,215 140,215 155,215 C 170,215 180,225 180,270 L 155,300 L 120,290 Z" fill="#03080f" />
    <!-- Arm reaching laptop -->
    <path d="M 155,240 L 200,240 L 210,260 L 190,270 Z" fill="#03080f" />
    
    <!-- Laptop silhouette with glowing cyan screen -->
    <path d="M 210,260 L 240,260 L 255,290 L 200,290 Z" fill="#060f1c" />
    <!-- Glowing laptop screen reflection -->
    <polygon points="213,263 237,263 245,285 205,285" fill="#00f0f0" opacity="0.6" filter="url(#glow)" />

    <!-- Keyboard glow dots -->
    <circle cx="215" cy="287" r="1.5" fill="#00a0ff" />
    <circle cx="225" cy="287" r="1.5" fill="#00f0f0" />
    <circle cx="235" cy="287" r="1.5" fill="#00a0ff" />
  </g>

  <!-- Holographic Projection from laptop/desk rising up (Right-Center) -->
  <!-- Hologram background glow -->
  <circle cx="520" cy="180" r="160" fill="url(#holo-glow)" class="holo-float" style="transform-origin: 520px 180px;" />

  <!-- Rising beam from laptop -->
  <polygon points="225,310 235,310 420,180 380,180" fill="url(#holo-glow)" opacity="0.4" />

  <!-- Holographic Planet Mercury / Solar orbit structures -->
  <g class="holo-float" style="transform-origin: 520px 180px;">
    
    <!-- Planet Wireframe (Mercury) -->
    <circle cx="520" cy="180" r="60" fill="none" stroke="#00f0f0" stroke-width="1.5" filter="url(#glow)" />
    <!-- Grid overlay on planet -->
    <ellipse cx="520" cy="180" rx="60" ry="15" fill="none" stroke="#00a0ff" stroke-width="1" stroke-dasharray="3 3" />
    <ellipse cx="520" cy="180" rx="15" ry="60" fill="none" stroke="#00a0ff" stroke-width="1" stroke-dasharray="3 3" />
    
    <!-- Concentric scanning rings (Spinning) -->
    <g class="holo-spin">
      <circle cx="520" cy="180" r="90" fill="none" stroke="#00f0f0" stroke-width="1.2" stroke-dasharray="20 40 10 30" />
      <circle cx="520" cy="180" r="110" fill="none" stroke="#00a0ff" stroke-width="0.8" stroke-dasharray="5 5" />
      <circle cx="520" cy="180" r="130" fill="none" stroke="#00f0f0" stroke-width="1" stroke-dasharray="40 100 20 40" />
      <circle cx="650" cy="180" r="3" fill="#00f0f0" filter="url(#glow)" />
      <circle cx="390" cy="180" r="3" fill="#00a0ff" />
    </g>

    <!-- Holographic Data Windows / UI panels around planet -->
    <!-- Window 1 (Top Left) -->
    <g transform="translate(360, 60)">
      <rect x="0" y="0" width="100" height="40" fill="#01040a" stroke="#00f0f0" stroke-width="1" opacity="0.8" />
      <text x="8" y="15" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00f0f0" font-weight="bold">TARGET: MER_CORE</text>
      <text x="8" y="28" font-family="'JetBrains Mono', monospace" font-size="7" fill="#00a0ff">TEMP: 430C // -180C</text>
      <line x1="85" y1="5" x2="95" y2="5" stroke="#00f0f0" stroke-width="1" />
    </g>

    <!-- Window 2 (Bottom Right) -->
    <g transform="translate(580, 240)">
      <rect x="0" y="0" width="110" height="45" fill="#01040a" stroke="#00a0ff" stroke-width="1" opacity="0.8" />
      <text x="8" y="15" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00f0f0">INQUIRY: ACTIVE</text>
      <text x="8" y="27" font-family="'JetBrains Mono', monospace" font-size="7" fill="#00a0ff">MATCH_STABLE: 94%</text>
      <text x="8" y="37" font-family="'JetBrains Mono', monospace" font-size="7" fill="#00f0f0" class="pulse-indicator">SEARCHING DATA...</text>
    </g>

    <!-- Targeting reticle -->
    <path d="M 440,180 L 460,180 M 450,170 L 450,190" stroke="#00f0f0" stroke-width="1.5" />
    <text x="440" y="165" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00f0f0">SCAN_LOC_A</text>
  </g>

  <!-- Ambient Light from holographic system illuminating operator environment -->
  <polygon points="280,0 280,450 800,450 800,0" fill="#00f0f0" opacity="0.03" />

  <!-- HUD Header overlay -->
  <g transform="translate(30, 40)">
    <text font-family="'JetBrains Mono', monospace" font-size="12" fill="#00f0f0" font-weight="bold">SCENARIO: RESEARCH_STATION // COGNITION</text>
    <text y="16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00a0ff">OPERATOR: CURIOSITY_NODE_09 // FEED: LIVE</text>
    <line x1="0" y1="24" x2="300" y2="24" stroke="#00f0f0" stroke-width="1.2" opacity="0.5" />
  </g>

  <!-- Telemetry Overlay in corners -->
  <g transform="translate(30, 410)">
    <text font-family="'JetBrains Mono', monospace" font-size="9" fill="#00a0ff" opacity="0.6">SYS.STATUS: DECK_STABLE</text>
  </g>
  <g transform="translate(770, 410)">
    <text font-family="'JetBrains Mono', monospace" font-size="9" fill="#00f0f0" text-anchor="end" opacity="0.8">TIME_ELAPSED: 04:42:19</text>
  </g>
</svg>
