<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <radialGradient id="space-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#020e1d"/>
      <stop offset="60%" stop-color="#00060f"/>
      <stop offset="100%" stop-color="#000103"/>
    </radialGradient>
    
    <!-- Light Path Gradient -->
    <linearGradient id="path-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#003366" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="#00a0ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00f0f0" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Core Truth Gradient -->
    <radialGradient id="truth-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#00f0f0" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00a0ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .star { fill: #ffffff; opacity: 0.3; animation: twinkle 4s infinite ease-in-out; }
    .star-1 { animation-delay: 0s; }
    .star-2 { animation-delay: 2s; }
    
    .pulse-truth { animation: pulseTruth 2s infinite ease-in-out; }
    .scale-ring { transform-origin: 620px 140px; animation: scaleRing 4s infinite ease-in-out; }
    .scale-ring-delay { transform-origin: 620px 140px; animation: scaleRing 4s infinite ease-in-out; animation-delay: 2s; }
    
    /* Animated wave pattern along the journey */
    .wave-line {
      stroke: #00f0f0;
      stroke-width: 1.5;
      fill: none;
      stroke-dasharray: 10 30;
      animation: waveFlow 5s infinite linear;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }
    @keyframes pulseTruth {
      0%, 100% { transform: scale(1.0); opacity: 0.9; }
      50% { transform: scale(1.1); opacity: 1.0; }
    }
    @keyframes scaleRing {
      0% { transform: scale(0.6); opacity: 0; }
      50% { opacity: 0.6; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @keyframes waveFlow {
      0% { stroke-dashoffset: 200; }
      100% { stroke-dashoffset: 0; }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#space-bg)" />

  <!-- Stars -->
  <circle cx="100" cy="80" r="1.2" class="star star-1" />
  <circle cx="280" cy="60" r="1" class="star star-2" />
  <circle cx="200" cy="300" r="1.5" class="star star-1" />
  <circle cx="720" cy="380" r="1.2" class="star star-2" />
  <circle cx="480" cy="350" r="1" class="star star-1" />

  <!-- Grid Pattern (Perspective/Depth representation) -->
  <g opacity="0.1">
    <path d="M 0,400 L 800,200 M 0,350 L 800,150 M 0,450 L 800,250" stroke="#00f0f0" stroke-width="1.5" />
    <path d="M 150,0 L 150,450 M 350,0 L 350,450 M 550,0 L 550,450" stroke="#00a0ff" stroke-width="1.5" />
  </g>

  <!-- Ascending Path (from lower-left to upper-right) -->
  <path d="M 50,420 Q 200,420 300,320 T 500,200 T 620,140" fill="none" stroke="url(#path-grad)" stroke-width="12" stroke-linecap="round" opacity="0.4" />
  
  <!-- Flow Lines over the path -->
  <path d="M 50,420 Q 200,420 300,320 T 500,200 T 620,140" class="wave-line" filter="url(#glow)" />
  <path d="M 50,420 Q 200,420 300,320 T 500,200 T 620,140" fill="none" stroke="#00a0ff" stroke-width="2" opacity="0.5" />

  <!-- Expanding energy rings around the Truth core -->
  <circle cx="620" cy="140" r="40" fill="none" stroke="#00f0f0" stroke-width="2" class="scale-ring" />
  <circle cx="620" cy="140" r="40" fill="none" stroke="#00a0ff" stroke-width="1" class="scale-ring-delay" />

  <!-- The Destination: Truth core / Synthesis -->
  <g class="pulse-truth" style="transform-origin: 620px 140px;">
    <circle cx="620" cy="140" r="80" fill="url(#truth-glow)" />
    <!-- Rotating diamond structure -->
    <polygon points="620,110 645,140 620,170 595,140" fill="#ffffff" filter="url(#glow)" />
    <polygon points="620,122 633,140 620,158 607,140" fill="#00f0f0" opacity="0.8" />
    <circle cx="620" cy="140" r="4" fill="#ffffff" />
  </g>

  <!-- Milestones along the path -->
  <g transform="translate(180, 410)">
    <circle cx="0" cy="0" r="6" fill="#003366" stroke="#00f0f0" stroke-width="1.5" />
    <circle cx="0" cy="0" r="2" fill="#00f0f0" />
    <text x="12" y="4" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00f0f0">STEP_01 // INITIATE</text>
  </g>
  
  <g transform="translate(370, 260)">
    <circle cx="0" cy="0" r="6" fill="#003366" stroke="#00f0f0" stroke-width="1.5" />
    <circle cx="0" cy="0" r="2" fill="#00f0f0" />
    <text x="12" y="-5" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00f0f0">STEP_02 // TRANSCEND</text>
  </g>

  <g transform="translate(520, 180)">
    <circle cx="0" cy="0" r="6" fill="#003366" stroke="#00f0f0" stroke-width="1.5" />
    <circle cx="0" cy="0" r="2" fill="#00f0f0" />
    <text x="-12" y="-12" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00f0f0" text-anchor="end">STEP_03 // REVEAL</text>
  </g>

  <!-- HUD text left-bottom -->
  <g transform="translate(40, 40)">
    <rect x="-10" y="-10" width="220" height="40" fill="#010612" stroke="#00f0f0" stroke-width="1" opacity="0.7" />
    <text x="10" y="15" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00f0f0" font-weight="bold">TRANSFORMATION PROTOCOL</text>
    <text x="10" y="26" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00a0ff">INTEGRATION_STATE: 89.2%</text>
  </g>

  <!-- HUD status stats right-bottom -->
  <g transform="translate(550, 380)">
    <text font-family="'JetBrains Mono', monospace" font-size="10" fill="#00f0f0" text-anchor="end">VECTOR: INFINITE_SEARCH</text>
    <text y="15" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00a0ff" text-anchor="end" opacity="0.8">ERROR_MARGIN: &lt; 0.001%</text>
    <line x1="-150" y1="25" x2="0" y2="25" stroke="#00f0f0" stroke-width="1" opacity="0.4" />
  </g>
</svg>
