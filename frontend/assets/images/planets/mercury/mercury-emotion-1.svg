<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <radialGradient id="space-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#020e1c"/>
      <stop offset="70%" stop-color="#010611"/>
      <stop offset="100%" stop-color="#000104"/>
    </radialGradient>
    
    <!-- Portal Glow -->
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0f0" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#00a0ff" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#003366" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Linear gradients for knowledge beams -->
    <linearGradient id="beam-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f0f0" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00a0ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00a0ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .star { fill: #ffffff; opacity: 0.4; animation: twinkle 4s infinite ease-in-out; }
    .star-1 { animation-delay: 0s; }
    .star-2 { animation-delay: 2s; }
    
    .spin-clockwise { transform-origin: 400px 225px; animation: spinCW 25s infinite linear; }
    .spin-counter { transform-origin: 400px 225px; animation: spinCCW 30s infinite linear; }
    .pulse-core { transform-origin: 400px 225px; animation: pulseCore 3s infinite ease-in-out; }
    
    .float-item { animation: floatItem 5s infinite ease-in-out; }
    .float-delay-1 { animation-delay: 1.5s; }
    .float-delay-2 { animation-delay: 3s; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 0.7; }
    }
    @keyframes spinCW {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinCCW {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulseCore {
      0%, 100% { transform: scale(1.0); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1.0; }
    }
    @keyframes floatItem {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.7; }
      50% { transform: translateY(-12px) rotate(5deg); opacity: 1.0; }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#space-bg)" />

  <!-- Stars / Digital dust -->
  <circle cx="80" cy="60" r="1" class="star star-1" />
  <circle cx="180" cy="380" r="1.5" class="star star-2" />
  <circle cx="720" cy="110" r="1" class="star star-1" />
  <circle cx="690" cy="350" r="1.2" class="star star-2" />
  <circle cx="350" cy="40" r="1" class="star star-2" />
  
  <!-- Grid Matrix Backplate -->
  <g opacity="0.15">
    <path d="M 100,0 L 100,450 M 200,0 L 200,450 M 300,0 L 300,450 M 400,0 L 400,450 M 500,0 L 500,450 M 600,0 L 600,450 M 700,0 L 700,450" stroke="#00f0f0" stroke-width="0.5" />
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#00f0f0" stroke-width="0.5" />
  </g>

  <!-- Central Nebula Glow -->
  <circle cx="400" cy="225" r="200" fill="url(#core-glow)" class="pulse-core" />

  <!-- Knowledge Beam / Light shaft passing through core -->
  <polygon points="360,0 440,0 420,450 380,450" fill="url(#beam-grad)" opacity="0.3" filter="url(#glow)" />
  <polygon points="100,225 700,225 700,226 100,226" fill="#00f0f0" opacity="0.5" filter="url(#glow)" />

  <!-- Concentric Portal Ring 1 (Spinning Clockwise) -->
  <g class="spin-clockwise" opacity="0.8">
    <circle cx="400" cy="225" r="130" fill="none" stroke="#00f0f0" stroke-width="1.5" stroke-dasharray="15 30 60 40" />
    <circle cx="400" cy="225" r="140" fill="none" stroke="#00a0ff" stroke-width="1" stroke-dasharray="5 10" />
    <rect x="395" y="80" width="10" height="10" fill="#00f0f0" transform="rotate(45, 400, 225)" />
    <rect x="395" y="360" width="10" height="10" fill="#00f0f0" transform="rotate(225, 400, 225)" />
  </g>

  <!-- Concentric Portal Ring 2 (Spinning Counter-Clockwise) -->
  <g class="spin-counter" opacity="0.6">
    <circle cx="400" cy="225" r="100" fill="none" stroke="#00a0ff" stroke-width="2" stroke-dasharray="80 80 40 40" />
    <circle cx="400" cy="225" r="90" fill="none" stroke="#00f0f0" stroke-width="0.7" stroke-dasharray="2 4" />
    <polygon points="400,130 395,140 405,140" fill="#00a0ff" />
    <polygon points="400,320 395,310 405,310" fill="#00a0ff" />
  </g>

  <!-- Core Singular Sphere of Curiosity -->
  <g class="pulse-core">
    <circle cx="400" cy="225" r="45" fill="none" stroke="#00f0f0" stroke-width="3" filter="url(#glow)" />
    <circle cx="400" cy="225" r="30" fill="#020e1c" stroke="#00a0ff" stroke-width="1.5" />
    <circle cx="400" cy="225" r="12" fill="#00f0f0" filter="url(#glow)" />
  </g>

  <!-- Floating Curiosity Fragments (Geometric Knowledge Cubes) -->
  <!-- Fragment 1 -->
  <g class="float-item" style="transform-origin: 220px 140px;">
    <polygon points="220,130 235,140 220,150 205,140" fill="#00f0f0" opacity="0.8" filter="url(#glow)" />
    <line x1="220" y1="130" x2="220" y2="150" stroke="#00a0ff" stroke-width="1" />
    <line x1="205" y1="140" x2="235" y2="140" stroke="#00a0ff" stroke-width="1" />
    <text x="245" y="143" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00f0f0" opacity="0.8">DATA_01</text>
  </g>

  <!-- Fragment 2 -->
  <g class="float-item float-delay-1" style="transform-origin: 580px 280px;">
    <polygon points="580,270 595,280 580,290 565,280" fill="#00a0ff" opacity="0.8" filter="url(#glow)" />
    <line x1="580" y1="270" x2="580" y2="290" stroke="#00f0f0" stroke-width="1" />
    <line x1="565" y1="280" x2="595" y2="280" stroke="#00f0f0" stroke-width="1" />
    <text x="605" y="283" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00a0ff" opacity="0.8">DATA_02</text>
  </g>

  <!-- Fragment 3 -->
  <g class="float-item float-delay-2" style="transform-origin: 300px 320px;">
    <circle cx="300" cy="320" r="6" fill="#00f0f0" filter="url(#glow)" />
    <circle cx="300" cy="320" r="12" fill="none" stroke="#00f0f0" stroke-width="0.8" stroke-dasharray="4 2" />
    <text x="260" y="340" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00f0f0" opacity="0.7">Q_VECTOR</text>
  </g>

  <!-- HUD Overlay Info Box -->
  <g transform="translate(40, 40)">
    <path d="M 0,0 L 15,0 L 25,10 L 180,10 L 190,0 L 220,0 L 220,40 L 210,50 L 0,50 Z" fill="#010611" stroke="#00f0f0" stroke-width="1.2" opacity="0.8" />
    <text x="15" y="23" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00f0f0" font-weight="bold">EMOTION: CURIOSITY</text>
    <text x="15" y="38" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00a0ff">STATE: HYPER_COGNITIVE</text>
    <rect x="5" y="5" width="4" height="4" fill="#00f0f0" />
  </g>

  <!-- HUD Telemetry Right -->
  <g transform="translate(560, 40)">
    <text font-family="'JetBrains Mono', monospace" font-size="9" fill="#00f0f0" text-anchor="end">SCANNING TRUTH DIMENSIONS</text>
    <text y="15" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00a0ff" text-anchor="end">PORTAL_STABILITY: 100%</text>
    <line x1="-120" y1="25" x2="0" y2="25" stroke="#00a0ff" stroke-width="1" />
  </g>

  <!-- Bracket Corners -->
  <path d="M 20,30 L 20,20 L 30,20" stroke="#00f0f0" stroke-width="2" fill="none" />
  <path d="M 780,30 L 780,20 L 770,20" stroke="#00f0f0" stroke-width="2" fill="none" />
  <path d="M 20,420 L 20,430 L 30,430" stroke="#00f0f0" stroke-width="2" fill="none" />
  <path d="M 780,420 L 780,430 L 770,430" stroke="#00f0f0" stroke-width="2" fill="none" />
</svg>
