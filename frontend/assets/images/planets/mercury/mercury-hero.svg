<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <radialGradient id="space-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#020d1a"/>
      <stop offset="60%" stop-color="#01060f"/>
      <stop offset="100%" stop-color="#000205"/>
    </radialGradient>
    
    <!-- Mercury Glow Gradient -->
    <radialGradient id="mercury-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0f0" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00a0ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Mercury Planet Gradient -->
    <linearGradient id="mercury-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0f0"/>
      <stop offset="40%" stop-color="#0077cc"/>
      <stop offset="80%" stop-color="#003366"/>
      <stop offset="100%" stop-color="#01060f"/>
    </linearGradient>

    <!-- Astronaut & Tech Gradient -->
    <linearGradient id="hud-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0f0"/>
      <stop offset="100%" stop-color="#00a0ff"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="intense-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .star { fill: #ffffff; opacity: 0.5; animation: twinkle 3s infinite ease-in-out; }
    .star-1 { animation-delay: 0s; }
    .star-2 { animation-delay: 1s; }
    .star-3 { animation-delay: 2s; }
    
    .pulse-glow { animation: pulseGlow 4s infinite ease-in-out; }
    .float-astro { animation: float 6s infinite ease-in-out; }
    .spin-ring { transform-origin: 520px 200px; animation: spin 20s infinite linear; }
    .spin-ring-rev { transform-origin: 520px 200px; animation: spinRev 25s infinite linear; }
    
    .hud-line { stroke: #00f0f0; stroke-width: 1; opacity: 0.4; }
    .hud-accent { fill: #00f0f0; }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 0.9; transform: scale(1.1); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.4; transform: scale(1.0); }
      50% { opacity: 0.8; transform: scale(1.05); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinRev {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#space-bg)" />

  <!-- Stars -->
  <circle cx="70" cy="90" r="1" class="star star-1" />
  <circle cx="210" cy="50" r="1.5" class="star star-2" />
  <circle cx="340" cy="120" r="1" class="star star-3" />
  <circle cx="680" cy="60" r="2" class="star star-1" />
  <circle cx="750" cy="180" r="1.2" class="star star-2" />
  <circle cx="120" cy="280" r="1.5" class="star star-3" />
  <circle cx="290" cy="340" r="1" class="star star-1" />
  <circle cx="480" cy="380" r="1.8" class="star star-2" />
  <circle cx="630" cy="300" r="1" class="star star-3" />

  <!-- Nebula Background Glow -->
  <circle cx="520" cy="200" r="220" fill="url(#mercury-glow)" class="pulse-glow" style="transform-origin: 520px 200px;" />

  <!-- Orbiting Data Rings / Portals of Curiosity (Tech overlay behind planet) -->
  <g class="spin-ring-rev" opacity="0.6">
    <circle cx="520" cy="200" r="160" fill="none" stroke="#00a0ff" stroke-width="1.5" stroke-dasharray="8 16" />
    <circle cx="520" cy="200" r="180" fill="none" stroke="#00f0f0" stroke-width="1" stroke-dasharray="40 100 20 40" />
    <!-- Tech nodes -->
    <circle cx="680" cy="200" r="4" fill="#00f0f0" filter="url(#glow-filter)" />
    <circle cx="360" cy="200" r="4" fill="#00a0ff" filter="url(#glow-filter)" />
  </g>

  <!-- Planet Mercury -->
  <circle cx="520" cy="200" r="110" fill="url(#mercury-grad)" filter="url(#glow-filter)" />

  <!-- Planet Surface Details (Tech circuits & craters) -->
  <!-- Crater shadows -->
  <circle cx="480" cy="160" r="15" fill="#003366" opacity="0.4" />
  <circle cx="550" cy="250" r="22" fill="#003366" opacity="0.4" />
  <circle cx="560" cy="130" r="10" fill="#003366" opacity="0.4" />
  <!-- Tech Circuit lines on planet to symbolize digital curiosity -->
  <path d="M 440,180 L 480,180 L 500,200 L 550,200" fill="none" stroke="#00f0f0" stroke-width="1.5" opacity="0.3" />
  <path d="M 520,110 L 520,150 L 540,170" fill="none" stroke="#00a0ff" stroke-width="1.5" opacity="0.3" />

  <!-- Outer Ring (Foreground) -->
  <g class="spin-ring" opacity="0.8">
    <ellipse cx="520" cy="200" rx="145" ry="145" fill="none" stroke="#00f0f0" stroke-width="1.5" stroke-dasharray="100 80 20 40" transform="rotate(-20, 520, 200)" />
    <circle cx="637" cy="115" r="3" fill="#00f0f0" />
  </g>

  <!-- Shadow Overlay for Planet Phase -->
  <path d="M 410,200 A 110,110 0 0,0 630,200 A 110,110 0 0,1 410,200 Z" fill="#000000" opacity="0.65" />

  <!-- Platform/Deck for Astronaut -->
  <g>
    <!-- Main deck -->
    <path d="M 0,340 L 280,340 L 240,390 L 0,390 Z" fill="#0a1829" stroke="#00f0f0" stroke-width="1.5" opacity="0.9" />
    <!-- Under deck details -->
    <path d="M 0,390 L 240,390 L 200,450 L 0,450 Z" fill="#050e18" opacity="0.95" />
    <!-- Neon edge light -->
    <line x1="0" y1="340" x2="280" y2="340" stroke="#00f0f0" stroke-width="2.5" filter="url(#glow-filter)" />
    <line x1="280" y1="340" x2="240" y2="390" stroke="#00a0ff" stroke-width="2" />
    <!-- Grid on the floor -->
    <line x1="40" y1="340" x2="20" y2="390" stroke="#00f0f0" stroke-width="1" opacity="0.3" />
    <line x1="100" y1="340" x2="80" y2="390" stroke="#00f0f0" stroke-width="1" opacity="0.3" />
    <line x1="160" y1="340" x2="140" y2="390" stroke="#00f0f0" stroke-width="1" opacity="0.3" />
    <line x1="220" y1="340" x2="200" y2="390" stroke="#00f0f0" stroke-width="1" opacity="0.3" />
  </g>

  <!-- Astronaut looking at Planet -->
  <g class="float-astro" transform="translate(140, 240) scale(0.8)">
    <!-- Spacesuit body -->
    <rect x="20" y="45" width="30" height="45" rx="8" fill="#0c233c" stroke="#00f0f0" stroke-width="2" />
    <!-- Helmet -->
    <circle cx="35" cy="25" r="18" fill="#00f0f0" stroke="#00a0ff" stroke-width="2.5" filter="url(#glow-filter)" opacity="0.9" />
    <!-- Visor reflection -->
    <path d="M 22,25 Q 35,12 48,25 Q 35,32 22,25 Z" fill="#030a16" />
    <!-- Oxygen tubes/pack -->
    <rect x="10" y="50" width="10" height="30" rx="3" fill="#005588" />
    <rect x="50" y="50" width="10" height="30" rx="3" fill="#005588" />
    <!-- Glow lines on suit -->
    <line x1="28" y1="55" x2="42" y2="55" stroke="#00f0f0" stroke-width="2" />
    <line x1="28" y1="65" x2="42" y2="65" stroke="#00a0ff" stroke-width="1.5" />
    <!-- Legs/Boots -->
    <rect x="22" y="90" width="11" height="12" rx="3" fill="#0c233c" stroke="#00f0f0" stroke-width="1.5" />
    <rect x="37" y="90" width="11" height="12" rx="3" fill="#0c233c" stroke="#00f0f0" stroke-width="1.5" />
    <circle cx="35" cy="5" r="2" fill="#00f0f0" class="pulse-glow" />
  </g>

  <!-- Sci-Fi HUD Overlay Elements -->
  <!-- Top Left Info -->
  <g transform="translate(30, 40)">
    <text font-family="'JetBrains Mono', monospace" font-size="13" fill="#00f0f0" letter-spacing="2" font-weight="bold">SYSTEM.LOC // MERCURY</text>
    <text y="20" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00a0ff" opacity="0.8">COORD: 05.82.91 // CURIOSITY CORE: ACTIVE</text>
    <line x1="0" y1="28" x2="260" y2="28" stroke="#00f0f0" stroke-width="1.5" opacity="0.5" />
    <rect x="0" y="26" width="30" height="4" fill="#00f0f0" />
    <rect x="250" y="26" width="10" height="4" fill="#00a0ff" />
  </g>

  <!-- Bottom Right Telemetry -->
  <g transform="translate(540, 390)">
    <rect x="-10" y="-5" width="240" height="45" fill="#01060f" opacity="0.6" stroke="#00a0ff" stroke-width="1" stroke-dasharray="10 5" />
    <text x="10" y="15" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00f0f0">SCANNER: FREQ_MATCH_CURIOSITY</text>
    <text x="10" y="30" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00a0ff">SIGNAL: 98.42% STABLE [SCANNING...]</text>
    <circle cx="215" cy="20" r="5" fill="#00f0f0" class="pulse-glow" filter="url(#glow-filter)" />
  </g>

  <!-- Graphic Crosshair in Center-Left -->
  <g transform="translate(340, 240)" opacity="0.4" class="float-astro">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#00f0f0" stroke-width="0.8" stroke-dasharray="4 4" />
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#00f0f0" stroke-width="0.8" />
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#00f0f0" stroke-width="0.8" />
  </g>
</svg>
