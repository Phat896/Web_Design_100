<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Space Gradient -->
    <radialGradient id="space-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#020a16"/>
      <stop offset="60%" stop-color="#01040a"/>
      <stop offset="100%" stop-color="#000103"/>
    </radialGradient>
    
    <!-- Silhouette Inner Gradient -->
    <linearGradient id="inner-mind" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a1d37"/>
      <stop offset="50%" stop-color="#002d5a"/>
      <stop offset="100%" stop-color="#00f0f0" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Scanner Gradient -->
    <linearGradient id="scan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0f0" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f0f0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f0f0" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .star { fill: #ffffff; opacity: 0.4; animation: twinkle 3s infinite ease-in-out; }
    .star-1 { animation-delay: 0s; }
    .star-2 { animation-delay: 1.5s; }
    
    .pulse-glow { animation: pulse 3s infinite ease-in-out; }
    
    /* Sweeping scanner bar animation */
    .scanner-bar {
      animation: scanSweep 6s infinite ease-in-out;
    }
    
    /* Moving electric impulses inside brain */
    .mind-pulse {
      animation: mindPulse 2.5s infinite ease-in-out;
    }
    .mind-pulse-delay {
      animation: mindPulse 2.5s infinite ease-in-out;
      animation-delay: 1.25s;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.9; }
    }
    @keyframes scanSweep {
      0%, 100% { transform: translateX(250px); opacity: 0.3; }
      50% { transform: translateX(480px); opacity: 0.9; }
    }
    @keyframes mindPulse {
      0%, 100% { r: 3; fill: #00a0ff; }
      50% { r: 6; fill: #00f0f0; filter: drop-shadow(0 0 5px #00f0f0); }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#space-bg)" />

  <!-- Stars -->
  <circle cx="80" cy="80" r="1" class="star star-1" />
  <circle cx="700" cy="120" r="1.5" class="star star-2" />
  <circle cx="680" cy="360" r="1.2" class="star star-1" />
  <circle cx="150" cy="350" r="1" class="star star-2" />

  <!-- Radar Circles in background -->
  <g opacity="0.1">
    <circle cx="400" cy="225" r="180" fill="none" stroke="#00f0f0" stroke-width="1" />
    <circle cx="400" cy="225" r="100" fill="none" stroke="#00a0ff" stroke-width="0.8" stroke-dasharray="8 8" />
  </g>

  <!-- Silhouette Profile facing right -->
  <!-- Set coordinate boundaries around cx=350, cy=220 -->
  <g transform="translate(60, 0)">
    <!-- Inner mind glowing network area (clipped to face silhouette) -->
    <!-- ClipPath definition -->
    <clipPath id="silhouette-clip">
      <path d="M 220,450 C 220,380 230,340 250,300 C 270,260 250,220 250,170 C 250,90 310,60 380,60 C 450,60 480,100 480,160 C 480,180 470,200 485,210 C 500,220 500,240 485,250 C 475,260 460,270 460,300 C 460,340 480,380 480,450 Z" />
    </clipPath>

    <!-- Face Silhouette backing -->
    <path d="M 220,450 C 220,380 230,340 250,300 C 270,260 250,220 250,170 C 250,90 310,60 380,60 C 450,60 480,100 480,160 C 480,180 470,200 485,210 C 500,220 500,240 485,250 C 475,260 460,270 460,300 C 460,340 480,380 480,450 Z" 
          fill="url(#inner-mind)" stroke="#00a0ff" stroke-width="2" />

    <!-- Content inside the Silhouette clip -->
    <g clip-path="url(#silhouette-clip)">
      <!-- Stars inside head -->
      <circle cx="340" cy="110" r="1" fill="#ffffff" opacity="0.6" />
      <circle cx="420" cy="150" r="1" fill="#ffffff" opacity="0.4" />
      <circle cx="380" cy="180" r="1.5" fill="#ffffff" opacity="0.8" />
      <circle cx="430" cy="90" r="1" fill="#ffffff" opacity="0.5" />
      <circle cx="300" cy="160" r="1" fill="#ffffff" opacity="0.6" />

      <!-- Cognitive Circuit Maze / Graph representing Curiosity nodes -->
      <path d="M 330,120 L 370,120 L 400,150 L 400,200 L 430,220" fill="none" stroke="#00f0f0" stroke-width="1.2" opacity="0.6" />
      <path d="M 380,90 L 380,140 L 350,170 L 350,230" fill="none" stroke="#00a0ff" stroke-width="1.2" opacity="0.6" />
      <path d="M 440,130 L 410,160 L 410,210 L 380,240" fill="none" stroke="#00f0f0" stroke-width="1.2" opacity="0.6" />

      <!-- Glowing mind nodes -->
      <circle cx="330" cy="120" r="4" class="mind-pulse" />
      <circle cx="400" cy="150" r="5" class="mind-pulse-delay" />
      <circle cx="400" cy="200" r="4" class="mind-pulse" />
      <circle cx="430" cy="220" r="5" class="mind-pulse-delay" />
      <circle cx="380" cy="90" r="4" class="mind-pulse-delay" />
      <circle cx="350" cy="170" r="5" class="mind-pulse" />
      
      <!-- Scanning glowing vertical sweep (inside silhouette only) -->
      <rect x="0" y="50" width="10" height="400" fill="url(#scan-grad)" class="scanner-bar" />
    </g>
  </g>

  <!-- Vertical Scanning line matching laser glow (across whole scene) -->
  <line x1="0" y1="60" x2="0" y2="420" stroke="#00f0f0" stroke-width="1.5" class="scanner-bar" filter="url(#glow)" style="opacity: 0.8;" />

  <!-- HUD text left -->
  <g transform="translate(40, 40)">
    <text font-family="'JetBrains Mono', monospace" font-size="12" fill="#00f0f0" font-weight="bold">SELF-DISCOVERY PORTRAIT // CURIOSITY</text>
    <text y="16" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00a0ff" opacity="0.8">INQUIRY TARGET: INTERNAL COGNITIVE STRUCTURE</text>
    <path d="M 0,24 L 200,24 L 210,34" fill="none" stroke="#00f0f0" stroke-width="1" opacity="0.4" />
  </g>

  <!-- HUD details right -->
  <g transform="translate(760, 390)">
    <text font-family="'JetBrains Mono', monospace" font-size="9" fill="#00f0f0" text-anchor="end">REFLECTIVE_RATIO: 1.618 (GOLDEN)</text>
    <text y="14" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00a0ff" text-anchor="end">SCAN_STATE: ANALYSIS_COMPLETE</text>
    <line x1="-180" y1="-8" x2="0" y2="-8" stroke="#00a0ff" stroke-width="1" opacity="0.3" />
  </g>
</svg>
