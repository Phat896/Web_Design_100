<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1c0303"/>
      <stop offset="100%" stop-color="#050000"/>
    </radialGradient>

    <!-- Glowing filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <filter id="strong-glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <style>
    .node-pulse { animation: nodeGlow 3s infinite ease-in-out; }
    .spark-line { stroke-dasharray: 8 4; animation: dash 20s infinite linear; }
    .radial-pulse { animation: radPulse 2s infinite ease-in-out; }
    .flash { animation: flashGlow 1.5s infinite alternate; }

    @keyframes nodeGlow {
      0%, 100% { filter: drop-shadow(0 0 3px #ef4444); }
      50% { filter: drop-shadow(0 0 10px #f97316); }
    }
    @keyframes dash {
      0% { stroke-dashoffset: 500; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes radPulse {
      0%, 100% { transform: scale(0.9); opacity: 0.4; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    @keyframes flashGlow {
      0% { fill: #f97316; filter: drop-shadow(0 0 2px #ef4444); }
      100% { fill: #ffffff; filter: drop-shadow(0 0 15px #facc15); }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Connecting Timeline Tube/Pipe -->
  <path d="M 150,200 L 650,200" stroke="#450a0a" stroke-width="6" stroke-linecap="round" />
  <path d="M 150,200 L 650,200" stroke="#f97316" stroke-width="2" stroke-linecap="round" class="spark-line" />

  <!-- Stage 1: Trigger -->
  <g transform="translate(150, 200)" class="node-pulse">
    <circle cx="0" cy="0" r="25" fill="#150505" stroke="#ef4444" stroke-width="2" />
    <!-- Small spark sparkler -->
    <circle cx="0" cy="0" r="4" fill="#ffffff" />
    <path d="M -10,0 L 10,0 M 0,-10 L 0,10 M -7,-7 L 7,7 M -7,7 L 7,-7" stroke="#facc15" stroke-width="1.5" />
    
    <text x="0" y="45" font-family="'JetBrains Mono', monospace" font-size="10" fill="#f87171" text-anchor="middle" font-weight="bold">01 / TRIGGER</text>
    <text x="0" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">External Stimulus</text>
  </g>

  <!-- Stage 2: Accumulation -->
  <g transform="translate(310, 200)" class="node-pulse">
    <circle cx="0" cy="0" r="28" fill="#150505" stroke="#ef4444" stroke-width="2" />
    <!-- Wavy heat waves inside -->
    <path d="M -15,-5 Q -5,-15 5,-5 T 15,-5" fill="none" stroke="#f97316" stroke-width="2" />
    <path d="M -15,5 Q -5,-5 5,5 T 15,5" fill="none" stroke="#ef4444" stroke-width="2" />
    
    <text x="0" y="45" font-family="'JetBrains Mono', monospace" font-size="10" fill="#f87171" text-anchor="middle" font-weight="bold">02 / BUILDUP</text>
    <text x="0" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Internal Pressure</text>
  </g>

  <!-- Stage 3: Ignition -->
  <g transform="translate(470, 200)" class="node-pulse">
    <!-- Concentric glowing rings -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#f97316" stroke-width="1" class="radial-pulse" transform-origin="0 0" />
    <circle cx="0" cy="0" r="30" fill="#150505" stroke="#facc15" stroke-width="2" />
    <!-- Swirling core -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 4" />
    <circle cx="0" cy="0" r="5" fill="#ffffff" />
    
    <text x="0" y="45" font-family="'JetBrains Mono', monospace" font-size="10" fill="#f87171" text-anchor="middle" font-weight="bold">03 / IGNITION</text>
    <text x="0" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Friction Threshold</text>
  </g>

  <!-- Stage 4: Detonation -->
  <g transform="translate(630, 200)">
    <!-- Starburst Explosion Background Glow -->
    <circle cx="0" cy="0" r="40" fill="#ef4444" opacity="0.3" filter="url(#strong-glow)" />
    
    <!-- Jagged Starburst -->
    <path d="M 0,-40 L 10,-15 L 35,-35 L 15,-10 L 40,0 L 15,10 L 35,35 L 10,15 L 0,40 L -10,15 L -35,35 L -15,10 L -40,0 L -15,-10 L -35,-35 L -10,-15 Z" fill="url(#bg)" stroke="#ef4444" stroke-width="2" />
    <circle cx="0" cy="0" r="8" fill="#ffffff" class="flash" />

    <text x="0" y="45" font-family="'JetBrains Mono', monospace" font-size="10" fill="#f87171" text-anchor="middle" font-weight="bold">04 / ERUPTION</text>
    <text x="0" y="60" font-family="'Inter', sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Emotional Release</text>
  </g>

  <!-- Title & Subtitle HUD style -->
  <text x="35" y="50" font-family="'Outfit', sans-serif" font-size="18" font-weight="bold" fill="#ef4444" letter-spacing="1">THE ORIGIN CASCADE</text>
  <text x="35" y="72" font-family="'JetBrains Mono', monospace" font-size="11" fill="#f97316" opacity="0.8">CHRONOLOGICAL ANGER TIMELINE PATH</text>
  <line x1="35" y1="80" x2="350" y2="80" stroke="#ef4444" stroke-width="1.5" opacity="0.3" />

  <!-- Timeline Status HUD metrics -->
  <rect x="35" y="320" width="160" height="45" rx="4" fill="#150505" stroke="#ef4444" stroke-width="1" opacity="0.8" />
  <text x="45" y="335" font-family="'JetBrains Mono', monospace" font-size="9" fill="#f97316">SYS.LOAD: 98.4%</text>
  <text x="45" y="350" font-family="'JetBrains Mono', monospace" font-size="9" fill="#ef4444">WARN: THERMAL_CRIT</text>
</svg>
