<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <radialGradient id="space-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#150202"/>
      <stop offset="100%" stop-color="#050000"/>
    </radialGradient>

    <!-- Glowing filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Flow Gradients -->
    <linearGradient id="chaotic-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    
    <linearGradient id="focused-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>

  <style>
    .flow-line-1 { stroke-dasharray: 200; stroke-dashoffset: 200; animation: runFlow 4s infinite linear; }
    .flow-line-2 { stroke-dasharray: 180; stroke-dashoffset: 180; animation: runFlow 3s infinite linear; }
    .flow-line-3 { stroke-dasharray: 220; stroke-dashoffset: 220; animation: runFlow 5s infinite linear; }
    
    .rotate-core { transform-origin: 400px 200px; animation: spin 20s infinite linear; }
    .pulse-ring { transform-origin: 400px 200px; animation: pulse 3s infinite ease-in-out; }
    
    @keyframes runFlow {
      0% { stroke-dashoffset: 400; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.96); opacity: 0.5; }
      50% { transform: scale(1.04); opacity: 0.9; }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#space-bg)" />

  <!-- Grid lines -->
  <line x1="50" y1="200" x2="750" y2="200" stroke="#450a0a" stroke-dasharray="5 5" stroke-width="1" />

  <!-- Chaos / Turbulence (Left Zone) -->
  <g fill="none" stroke-width="3" filter="url(#glow)" opacity="0.8">
    <!-- Jagged wild waves -->
    <path d="M 50,150 L 100,230 L 140,110 L 190,270 L 240,130 L 290,220 L 330,170 Q 360,150 380,180" stroke="url(#chaotic-grad)" class="flow-line-1" />
    <path d="M 50,200 L 90,120 L 150,260 L 200,160 L 250,240 L 300,140 Q 350,200 380,200" stroke="url(#chaotic-grad)" class="flow-line-2" />
    <path d="M 50,250 L 110,180 L 160,290 L 210,210 L 260,270 L 310,190 Q 340,250 380,220" stroke="url(#chaotic-grad)" class="flow-line-3" />
  </g>

  <!-- Transformational Lens / Core (Center) -->
  <g>
    <!-- Background glow of core -->
    <circle cx="400" cy="200" r="65" fill="#ef4444" opacity="0.15" filter="url(#glow-strong)" />
    
    <!-- Pulsing Outer Hexagon Ring -->
    <polygon points="400,130 460,165 460,235 400,270 340,235 340,165" fill="none" stroke="#f97316" stroke-width="2" class="pulse-ring" />
    
    <!-- Rotating Inner Tech Ring -->
    <g class="rotate-core">
      <circle cx="400" cy="200" r="45" fill="none" stroke="#eab308" stroke-width="3" stroke-dasharray="15 8 5 8" />
      <polygon points="400,170 426,215 374,215" fill="none" stroke="#ef4444" stroke-width="2" />
    </g>
    <circle cx="400" cy="200" r="10" fill="#ffffff" filter="url(#glow)" />
  </g>

  <!-- Focused Power / Alignment (Right Zone) -->
  <g fill="none" stroke-width="3.5" filter="url(#glow)" opacity="0.9">
    <!-- Smooth linear streams -->
    <path d="M 420,180 Q 450,180 480,180 T 580,180 T 680,180 T 750,180" stroke="url(#focused-grad)" class="flow-line-1" />
    <path d="M 420,200 Q 450,200 480,200 T 580,200 T 680,200 T 750,200" stroke="url(#focused-grad)" class="flow-line-2" style="animation-delay: 1s;" />
    <path d="M 420,220 Q 450,220 480,220 T 580,220 T 680,220 T 750,220" stroke="url(#focused-grad)" class="flow-line-3" style="animation-delay: 2s;" />
  </g>

  <!-- Tech Lines & Sub-elements -->
  <line x1="330" y1="120" x2="350" y2="100" stroke="#f97316" stroke-width="1" />
  <line x1="350" y1="100" x2="450" y2="100" stroke="#f97316" stroke-width="1" />
  <text x="455" y="103" font-family="'JetBrains Mono', monospace" font-size="9" fill="#eab308">ALIGNMENT_FIELD: ACTIVE</text>

  <!-- Main Text -->
  <text x="35" y="325" font-family="'Outfit', sans-serif" font-size="20" font-weight="bold" fill="#ef4444" letter-spacing="1">CHANNELED MOTION</text>
  <text x="35" y="348" font-family="'Inter', sans-serif" font-size="12" fill="#f87171" opacity="0.8">Transforming chaotic emotional heat into coherent, high-velocity drive.</text>
  <text x="35" y="368" font-family="'JetBrains Mono', monospace" font-size="10" fill="#eab308" opacity="0.9">OUTPUT: STABLE // DIRECTED_FORCE: MAX</text>
</svg>
