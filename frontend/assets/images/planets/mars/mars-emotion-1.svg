<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <!-- Deep red volcanic abyss -->
    <radialGradient id="abyss" cx="50%" cy="100%" r="90%">
      <stop offset="0%" stop-color="#3f0712"/>
      <stop offset="50%" stop-color="#180206"/>
      <stop offset="100%" stop-color="#050001"/>
    </radialGradient>
    
    <!-- Linear gradient for energy beams -->
    <linearGradient id="energy-beam" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#facc15" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <style>
    .erupt-spike { animation: erupt 3s infinite ease-out; }
    .sparkle { animation: float-up 4s infinite linear; }
    .beam { stroke: url(#energy-beam); opacity: 0.4; stroke-dasharray: 80; animation: stream 5s infinite linear; }
    .pulse-core { animation: core-glow 2s infinite ease-in-out; }

    @keyframes erupt {
      0% { transform: scaleY(0.4); opacity: 0.5; }
      50% { transform: scaleY(1.1); opacity: 1; filter: drop-shadow(0 0 10px #f97316); }
      100% { transform: scaleY(0.4); opacity: 0.5; }
    }
    @keyframes float-up {
      0% { transform: translateY(0px) scale(0.8); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-250px) scale(1.3); opacity: 0; }
    }
    @keyframes stream {
      0% { stroke-dashoffset: 160; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes core-glow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.05); }
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#abyss)" />

  <!-- Grid lines (angled perspective) -->
  <g stroke="#991b1b" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="350" x2="800" y2="350" />
    <line x1="0" y1="370" x2="800" y2="370" />
    <line x1="0" y1="390" x2="800" y2="390" />
    <line x1="100" y1="400" x2="200" y2="320" />
    <line x1="300" y1="400" x2="350" y2="320" />
    <line x1="500" y1="400" x2="450" y2="320" />
    <line x1="700" y1="400" x2="600" y2="320" />
  </g>

  <!-- Vertical Glowing Energy Streams -->
  <line x1="220" y1="0" x2="220" y2="400" stroke-width="2" class="beam" />
  <line x1="380" y1="0" x2="380" y2="400" stroke-width="4" class="beam" style="animation-delay: 1.5s;" />
  <line x1="420" y1="0" x2="420" y2="400" stroke-width="3" class="beam" style="animation-delay: 0.5s;" />
  <line x1="580" y1="0" x2="580" y2="400" stroke-width="1.5" class="beam" style="animation-delay: 2.2s;" />

  <!-- Erupting Sparks/Particles (Floating upwards) -->
  <circle cx="370" cy="300" r="4" fill="#facc15" class="sparkle" style="animation-delay: 0s;" />
  <circle cx="410" cy="280" r="3" fill="#ef4444" class="sparkle" style="animation-delay: 1s;" />
  <circle cx="390" cy="330" r="5" fill="#f97316" class="sparkle" style="animation-delay: 1.8s;" />
  <circle cx="430" cy="290" r="2" fill="#ffffff" class="sparkle" style="animation-delay: 2.5s;" />
  <circle cx="360" cy="260" r="3" fill="#facc15" class="sparkle" style="animation-delay: 0.7s;" />
  <circle cx="440" cy="320" r="4.5" fill="#ef4444" class="sparkle" style="animation-delay: 3.1s;" />

  <!-- Erupting Volcanic Silhouette & Energy Spikes -->
  <g transform="translate(400, 360)">
    <!-- Base Glow -->
    <ellipse cx="0" cy="0" rx="140" ry="40" fill="#ef4444" opacity="0.3" filter="url(#glow)" class="pulse-core" />
    <ellipse cx="0" cy="0" rx="70" ry="20" fill="#f97316" opacity="0.4" filter="url(#glow)" />
    
    <!-- Jagged Volcanic Crags -->
    <path d="M -160,20 L -90,-40 L -60,-20 L 0,-90 L 50,-30 L 110,-50 L 160,20 Z" fill="#180206" stroke="#ef4444" stroke-width="2.5" />
    
    <!-- Central Eruption Cone & Lava Flow -->
    <path d="M -30,-50 L 0,-90 L 30,-50 Z" fill="#991b1b" />
    <path d="M -5,-55 Q 0,-85 5,-55 T 10,-30" stroke="#facc15" stroke-width="3" fill="none" filter="url(#glow)" />
    
    <!-- Energy Spikes shooting from Volcano -->
    <path d="M 0,-90 L -25,-260 L 0,-290 L 25,-260 Z" fill="url(#energy-beam)" class="erupt-spike" transform-origin="0 -90" />
    <path d="M 0,-90 L -50,-210 L -30,-220 L 0,-90 Z" fill="url(#energy-beam)" class="erupt-spike" style="animation-delay: 0.8s;" transform-origin="0 -90" />
    <path d="M 0,-90 L 40,-200 L 20,-210 L 0,-90 Z" fill="url(#energy-beam)" class="erupt-spike" style="animation-delay: 1.6s;" transform-origin="0 -90" />
  </g>

  <!-- Side peaks (adds depth) -->
  <path d="M 0,380 L 120,310 L 180,380 Z" fill="#0c0103" stroke="#991b1b" stroke-width="1.5" />
  <path d="M 620,380 L 700,320 L 800,380 Z" fill="#0c0103" stroke="#991b1b" stroke-width="1.5" />

  <!-- Labels & HUD elements -->
  <text x="35" y="325" font-family="'Outfit', sans-serif" font-size="20" font-weight="bold" fill="#ef4444" letter-spacing="1">THE VOLATILE CORE</text>
  <text x="35" y="348" font-family="'Inter', sans-serif" font-size="12" fill="#f87171" opacity="0.8">A sudden, explosive discharge of long-repressed internal heat.</text>
  <text x="35" y="368" font-family="'JetBrains Mono', monospace" font-size="10" fill="#991b1b" opacity="0.9">CORE.PSI: HIGH // MAGMA_FLOW: UNSTABLE</text>
</svg>
