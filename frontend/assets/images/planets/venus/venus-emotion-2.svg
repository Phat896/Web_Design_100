<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1d042b"/>
      <stop offset="70%" stop-color="#0c0114"/>
      <stop offset="100%" stop-color="#040008"/>
    </radialGradient>

    <!-- Glowing Nodes Gradient -->
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="1"/>
      <stop offset="50%" stop-color="#ffb6c1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#da70d6" stop-opacity="0"/>
    </radialGradient>

    <!-- Path Gradient Left-to-Right -->
    <linearGradient id="path-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700"/> <!-- Spark of curiosity (Gold) -->
      <stop offset="40%" stop-color="#ffb6c1"/> <!-- Attraction (Pink) -->
      <stop offset="75%" stop-color="#da70d6"/> <!-- Integration (Purple) -->
      <stop offset="100%" stop-color="#ffd700"/> <!-- Transcendence (Gold) -->
    </linearGradient>

    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: url(#bg-grad); }
    .grid-line { stroke: #da70d6; opacity: 0.1; stroke-width: 0.5; }
    .timeline-path { fill: none; stroke: url(#path-grad); stroke-width: 2.5; }
    .flow-dash { stroke: #ffffff; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 0, 100; animation: flow 6s linear infinite; }
    .flow-dash-2 { stroke: #ffd700; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 0, 80; animation: flow 4s linear infinite 2s; }
    
    .pulse-ring { transform-origin: center; animation: ring-pulse 3s infinite ease-in-out; }
    .pulse-glow { animation: soft-pulse 4s infinite ease-in-out; }
    .node-text { font-family: JetBrains Mono, Courier New, monospace; font-size: 10px; fill: #ffb6c1; }
    .node-title { font-family: JetBrains Mono, Courier New, monospace; font-size: 12px; font-weight: bold; fill: #ffd700; }

    @keyframes flow {
      0% { stroke-dashoffset: 0; stroke-dasharray: 10, 300; }
      50% { stroke-dasharray: 30, 200; }
      100% { stroke-dashoffset: -300; stroke-dasharray: 10, 300; }
    }
    @keyframes ring-pulse {
      0% { r: 6; opacity: 0.8; stroke-width: 1; }
      50% { r: 18; opacity: 0; stroke-width: 2; }
      100% { r: 6; opacity: 0; stroke-width: 0; }
    }
    @keyframes soft-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="450" class="bg"/>

  <!-- Tech Grid Lines -->
  <g>
    <!-- Horizontal lines -->
    <line x1="50" y1="100" x2="750" y2="100" class="grid-line"/>
    <line x1="50" y1="210" x2="750" y2="210" class="grid-line" stroke-width="1" opacity="0.2"/>
    <line x1="50" y1="320" x2="750" y2="320" class="grid-line"/>
    <!-- Vertical lines -->
    <line x1="150" y1="50" x2="150" y2="370" class="grid-line"/>
    <line x1="320" y1="50" x2="320" y2="370" class="grid-line"/>
    <line x1="490" y1="50" x2="490" y2="370" class="grid-line"/>
    <line x1="660" y1="50" x2="660" y2="370" class="grid-line"/>
  </g>

  <!-- Timeline Flow Wave Paths -->
  <!-- Top Helix Wave -->
  <path d="M 150 210 Q 235 120 320 210 T 490 210 T 660 210" class="timeline-path" opacity="0.8"/>
  <path d="M 150 210 Q 235 120 320 210 T 490 210 T 660 210" class="flow-dash"/>

  <!-- Bottom Helix Wave -->
  <path d="M 150 210 Q 235 300 320 210 T 490 210 T 660 210" class="timeline-path" opacity="0.4" stroke-dasharray="5, 5"/>
  <path d="M 150 210 Q 235 300 320 210 T 490 210 T 660 210" class="flow-dash-2"/>

  <!-- Straight Baseline -->
  <line x1="100" y1="210" x2="700" y2="210" stroke="#ffb6c1" stroke-width="1.5" opacity="0.25"/>

  <!-- Origin Spark (Node 1: Curiosity) -->
  <g transform="translate(150, 210)">
    <circle cx="0" cy="0" r="25" fill="url(#node-glow)" class="pulse-glow"/>
    <circle cx="0" cy="0" r="6" fill="#ffd700" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#ffd700" class="pulse-ring"/>
    
    <text x="0" y="-35" text-anchor="middle" class="node-title">01 / CURIOSITY</text>
    <text x="0" y="35" text-anchor="middle" class="node-text">SPARK INSTIGATION</text>
    <text x="0" y="47" text-anchor="middle" class="node-text" opacity="0.6">T = -1.08 M/S</text>
  </g>

  <!-- Node 2: Attraction (Interlock) -->
  <g transform="translate(320, 210)">
    <circle cx="0" cy="0" r="25" fill="url(#node-glow)" class="pulse-glow"/>
    <circle cx="0" cy="0" r="6" fill="#ffb6c1" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#ffb6c1" class="pulse-ring" style="animation-delay: 1s;"/>
    
    <text x="0" y="-35" text-anchor="middle" class="node-title">02 / ATTRACTION</text>
    <text x="0" y="35" text-anchor="middle" class="node-text">FREQUENCY LOCK</text>
    <text x="0" y="47" text-anchor="middle" class="node-text" opacity="0.6">POLARITY = +9.8</text>
  </g>

  <!-- Node 3: Integration (Hormone Flow) -->
  <g transform="translate(490, 210)">
    <circle cx="0" cy="0" r="25" fill="url(#node-glow)" class="pulse-glow"/>
    <circle cx="0" cy="0" r="6" fill="#da70d6" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#da70d6" class="pulse-ring" style="animation-delay: 2s;"/>
    
    <text x="0" y="-35" text-anchor="middle" class="node-title">03 / INTEGRATION</text>
    <text x="0" y="35" text-anchor="middle" class="node-text">PATHWAY SYNAPSE</text>
    <text x="0" y="47" text-anchor="middle" class="node-text" opacity="0.6">CO-EFFICIENT: 0.94</text>
  </g>

  <!-- Node 4: Transcendence (Love Blooming) -->
  <g transform="translate(660, 210)">
    <circle cx="0" cy="0" r="30" fill="url(#node-glow)" class="pulse-glow"/>
    <!-- Small heart path in place of node circle -->
    <path d="M 0 5 C -5 0 -10 0 -12 5 C -15 0 -20 0 -22 5 C -25 10 -20 20 -12 28 C -4 20 1 10 -2 5 Z" 
          fill="#ffd700" filter="url(#glow)" transform="translate(12, -18) scale(0.65)"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#ffd700" class="pulse-ring" style="animation-delay: 1.5s;"/>
    
    <text x="0" y="-35" text-anchor="middle" class="node-title">04 / TRANSCENDENCE</text>
    <text x="0" y="35" text-anchor="middle" class="node-text">EMOTIONAL FLOW UNIFIED</text>
    <text x="0" y="47" text-anchor="middle" class="node-text" opacity="0.6">OUTPUT = ∞</text>
  </g>

  <!-- HUD Graph Indicators -->
  <!-- Top Center Title -->
  <g transform="translate(400, 45)" text-anchor="middle" font-family="JetBrains Mono, Courier New, monospace">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#ffd700" letter-spacing="4">ORIGIN OF EMOTIONAL WAVE</text>
    <text x="0" y="15" font-size="9" fill="#ffb6c1" letter-spacing="2">VENUS DEEP CORE CHRONOGRAPH</text>
  </g>

  <!-- Sidebar HUD Status Info -->
  <g transform="translate(40, 50)" font-family="JetBrains Mono, Courier New, monospace" font-size="8" fill="#ffb6c1" opacity="0.7">
    <text x="0" y="0">CALIBRATING TIME VECTORS...</text>
    <text x="0" y="10">SYS: OPERATIONAL</text>
    <text x="0" y="20">SCALE: 1:1,000,000,000</text>
  </g>

  <!-- Sidebar HUD Status Info Right -->
  <g transform="translate(760, 50)" text-anchor="end" font-family="JetBrains Mono, Courier New, monospace" font-size="8" fill="#ffb6c1" opacity="0.7">
    <text x="0" y="0">ORBIT PATH: SYMMETRIC</text>
    <text x="0" y="10">STARDUST DENSITY: HIGH</text>
    <text x="0" y="20">THERMAL RATE: STABLE</text>
  </g>

  <!-- Bottom Timeline Axis scale -->
  <g transform="translate(100, 390)">
    <line x1="0" y1="0" x2="600" y2="0" stroke="#ffb6c1" stroke-width="1" opacity="0.4"/>
    <line x1="50" y1="0" x2="50" y2="8" stroke="#ffd700" stroke-width="1.5"/>
    <text x="50" y="22" font-family="JetBrains Mono, Courier New, monospace" font-size="8" fill="#ffb6c1" text-anchor="middle">EPOCH I</text>
    
    <line x1="220" y1="0" x2="220" y2="8" stroke="#ffd700" stroke-width="1.5"/>
    <text x="220" y="22" font-family="JetBrains Mono, Courier New, monospace" font-size="8" fill="#ffb6c1" text-anchor="middle">EPOCH II</text>
    
    <line x1="390" y1="0" x2="390" y2="8" stroke="#ffd700" stroke-width="1.5"/>
    <text x="390" y="22" font-family="JetBrains Mono, Courier New, monospace" font-size="8" fill="#ffb6c1" text-anchor="middle">EPOCH III</text>
    
    <line x1="560" y1="0" x2="560" y2="8" stroke="#ffd700" stroke-width="1.5"/>
    <text x="560" y="22" font-family="JetBrains Mono, Courier New, monospace" font-size="8" fill="#ffb6c1" text-anchor="middle">EPOCH IV</text>
  </g>
</svg>
