<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1c0324"/>
      <stop offset="70%" stop-color="#0a0011"/>
      <stop offset="100%" stop-color="#020005"/>
    </radialGradient>

    <!-- Node Glow Gradient -->
    <radialGradient id="node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ffb6c1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#da70d6" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: url(#bg-grad); }
    .neural-line { fill: none; stroke: #da70d6; stroke-width: 1; opacity: 0.35; }
    .neural-line-active { fill: none; stroke: #ffd700; stroke-width: 1.5; opacity: 0.85; stroke-dasharray: 8, 40; animation: dash-crawl 6s linear infinite; }
    .synapse { fill: #ffffff; animation: pulse-node 2.5s infinite ease-in-out; }
    .hormone-node { fill: url(#node-glow); animation: pulse-node 4s infinite ease-in-out; }
    .molecule-path { fill: none; stroke: #ffb6c1; stroke-width: 1.5; opacity: 0.7; }
    .hud-text { font-family: JetBrains Mono, Courier New, monospace; font-size: 9px; fill: #ffb6c1; }
    .hud-header { font-family: JetBrains Mono, Courier New, monospace; font-size: 11px; font-weight: bold; fill: #ffd700; }

    @keyframes dash-crawl {
      to { stroke-dashoffset: -120; }
    }
    @keyframes pulse-node {
      0%, 100% { transform: scale(0.9); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 8px #ffd700); }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="450" class="bg"/>

  <!-- Molecular Structure Grid Background (Oxytocin / Dopamine structure) -->
  <!-- Left Side Molecule -->
  <g transform="translate(100, 110)" class="molecule" opacity="0.4">
    <!-- Hexagonal Benzene ring -->
    <polygon points="40,0 80,23 80,68 40,91 0,68 0,23" class="molecule-path" stroke-dasharray="100" />
    <polygon points="35,8 68,27 68,63 35,82 8,63 8,27" class="molecule-path" opacity="0.5"/>
    <!-- Connected Chains -->
    <line x1="80" y1="23" x2="120" y2="0" class="molecule-path" />
    <line x1="120" y1="0" x2="160" y2="23" class="molecule-path" />
    <line x1="160" y1="23" x2="160" y2="60" class="molecule-path" />
    <!-- Atoms -->
    <circle cx="40" cy="0" r="3" fill="#ffd700"/>
    <circle cx="80" cy="23" r="3" fill="#ffb6c1"/>
    <circle cx="160" cy="60" r="4" fill="#ffd700" filter="url(#glow)"/>
    <text x="170" y="64" class="hud-text" fill="#ffd700">OH</text>
    <text x="32" y="-10" class="hud-text">CH3</text>
  </g>

  <!-- Right Side Molecule -->
  <g transform="translate(620, 240)" class="molecule" opacity="0.4">
    <polygon points="30,0 60,17 60,51 30,68 0,51 0,17" class="molecule-path" />
    <line x1="60" y1="17" x2="90" y2="0" class="molecule-path" />
    <line x1="90" y1="0" x2="120" y2="17" class="molecule-path" />
    <circle cx="120" cy="17" r="4" fill="#ffd700" filter="url(#glow)"/>
    <text x="128" y="21" class="hud-text" fill="#ffd700">NH2</text>
    <text x="-18" y="21" class="hud-text">HO</text>
    <circle cx="0" cy="17" r="3" fill="#ffb6c1"/>
  </g>

  <!-- Neural Brain Network Structure (Center-Right) -->
  <!-- We model the brain shape using connected node arrays -->
  <g transform="translate(180, 20)">
    <!-- Base Neural Lines (Brain shape mapping) -->
    <!-- Frontal Lobe (Left) -->
    <path d="M 100 180 Q 80 120 130 90 T 220 100 T 270 160" class="neural-line" />
    <path d="M 100 180 Q 80 120 130 90 T 220 100 T 270 160" class="neural-line-active" />
    
    <!-- Parietal & Occipital Lobe (Top/Right) -->
    <path d="M 270 160 Q 320 100 370 130 T 400 220 T 360 290" class="neural-line" />
    <path d="M 270 160 Q 320 100 370 130 T 400 220 T 360 290" class="neural-line-active" style="animation-delay: -2s;"/>

    <!-- Temporal Lobe (Bottom) -->
    <path d="M 100 180 Q 120 250 180 270 T 280 250 T 360 290" class="neural-line" />
    <path d="M 100 180 Q 120 250 180 270 T 280 250 T 360 290" class="neural-line-active" style="animation-delay: -4s;"/>

    <!-- Internal Limbic System pathways (The Emotional Core) -->
    <!-- Convoluted paths in the center forming a heart-like loop inside the brain -->
    <path d="M 200 180 C 200 160 220 140 240 160 C 260 140 280 160 280 180 C 280 210 240 240 240 250 C 240 240 200 210 200 180 Z" 
          fill="none" stroke="#ffd700" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
    <path d="M 240 160 Q 240 220 200 180" class="neural-line-active"/>

    <!-- Brain Stem -->
    <path d="M 270 270 Q 260 330 240 370" stroke="#da70d6" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="5, 10"/>
    <path d="M 270 270 Q 260 330 240 370" stroke="#ffd700" stroke-width="1" fill="none" opacity="0.8" class="path-dash"/>

    <!-- Synapses (Nodes) -->
    <g transform="translate(100, 180)"><circle cx="0" cy="0" r="4" class="synapse"/><circle cx="0" cy="0" r="10" fill="none" stroke="#ffb6c1" opacity="0.3" class="synapse"/></g>
    <g transform="translate(130, 90)"><circle cx="0" cy="0" r="3" class="synapse"/></g>
    <g transform="translate(220, 100)"><circle cx="0" cy="0" r="5" class="synapse" style="animation-delay: 0.5s;"/><text x="8" y="-4" class="hud-text">CORTEX</text></g>
    <g transform="translate(270, 160)"><circle cx="0" cy="0" r="4" class="synapse"/></g>
    <g transform="translate(370, 130)"><circle cx="0" cy="0" r="5" class="synapse" style="animation-delay: 1.2s;"/></g>
    <g transform="translate(400, 220)"><circle cx="0" cy="0" r="4" class="synapse"/><circle cx="0" cy="0" r="9" fill="none" stroke="#da70d6" opacity="0.3" class="synapse"/></g>
    <g transform="translate(360, 290)"><circle cx="0" cy="0" r="5" class="synapse" style="animation-delay: 0.8s;"/><text x="8" y="10" class="hud-text">OCCIPITAL</text></g>
    <g transform="translate(180, 270)"><circle cx="0" cy="0" r="4" class="synapse"/></g>
    <g transform="translate(280, 250)"><circle cx="0" cy="0" r="5" class="synapse" style="animation-delay: 1.5s;"/></g>
    
    <!-- Emotional Core Firing Nodes (Limbic system nodes) -->
    <g transform="translate(240, 160)"><circle cx="0" cy="0" r="6" class="hormone-node" filter="url(#glow)"/><text x="10" y="-5" class="hud-header" font-size="9">OXYTOCIN</text></g>
    <g transform="translate(200, 180)"><circle cx="0" cy="0" r="6" class="hormone-node" filter="url(#glow)"/><text x="-55" y="3" class="hud-header" font-size="9">DOPAMINE</text></g>
    <g transform="translate(280, 180)"><circle cx="0" cy="0" r="6" class="hormone-node" filter="url(#glow)"/><text x="10" y="3" class="hud-header" font-size="9">SEROTONIN</text></g>
  </g>

  <!-- Left Side Technical Telemetry -->
  <g transform="translate(40, 50)" font-family="JetBrains Mono, Courier New, monospace" fill="#ffb6c1" opacity="0.85">
    <rect x="-10" y="-10" width="180" height="120" fill="none" stroke="#da70d6" stroke-width="1" opacity="0.3"/>
    <line x1="-10" y1="-10" x2="30" y2="-10" stroke="#ffd700" stroke-width="3"/>
    <text x="5" y="15" font-weight="bold" fill="#ffd700">NEURO-TRANSMISSION</text>
    <text x="5" y="35">LOBE: VENUS-CORE-A1</text>
    <text x="5" y="55">OXYTOCIN: 85.3 pg/mL</text>
    <text x="5" y="70">DOPAMINE: 120.4 pg/mL</text>
    <text x="5" y="85">SEROTONIN: 98.1 pg/mL</text>
    <text x="5" y="100">STATUS: CURIOSITY ACTIVE</text>
  </g>

  <!-- Bottom HUD Panel -->
  <g transform="translate(40, 400)">
    <line x1="0" y1="0" x2="720" y2="0" stroke="#da70d6" stroke-width="1" opacity="0.4"/>
    <rect x="0" y="-1" width="100" height="2" fill="#ffd700" filter="url(#glow)"/>
    <text x="0" y="18" class="hud-header">SYS.ANALYSIS // NEURAL NETWORK OF INTENSE CURIOSITY</text>
    <text x="720" y="18" class="hud-text" text-anchor="end">MATRIX CO-EFFICIENT: 9.88 // REF: VENUS-05</text>
  </g>
</svg>
