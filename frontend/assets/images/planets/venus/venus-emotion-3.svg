<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1f0227"/>
      <stop offset="60%" stop-color="#0e0015"/>
      <stop offset="100%" stop-color="#030006"/>
    </radialGradient>

    <!-- Portal Glow -->
    <radialGradient id="portal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ffb6c1" stop-opacity="0.6"/>
      <stop offset="85%" stop-color="#da70d6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1f0227" stop-opacity="0"/>
    </radialGradient>

    <!-- Unified Beam Gradient -->
    <linearGradient id="beam-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.4"/>
      <stop offset="20%" stop-color="#ffd700" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ffb6c1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#da70d6" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: url(#bg-grad); }
    .star { fill: #ffffff; opacity: 0.3; }
    .star-twinkle { animation: twinkle 3.5s infinite ease-in-out; }
    
    /* Animations */
    .portal-pulse { transform-origin: 360px 225px; animation: pulse-ring 4s infinite ease-in-out; }
    .portal-rotate { transform-origin: 360px 225px; animation: rotate-portal 12s linear infinite; }
    .path-dash { stroke-dasharray: 10, 40; animation: dash-move 8s linear infinite; }
    .stardust-rise { animation: float-up 6s infinite ease-in-out; }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50% { opacity: 0.9; transform: scale(1.3); }
    }
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px #ffb6c1); }
      50% { transform: scale(1.08); filter: drop-shadow(0 0 30px #ffd700); }
    }
    @keyframes rotate-portal {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes dash-move {
      to { stroke-dashoffset: -150; }
    }
    @keyframes float-up {
      0% { transform: translateY(0px) opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-30px) opacity: 0; }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="450" class="bg"/>

  <!-- Starfield -->
  <g>
    <circle cx="90" cy="80" r="1.5" class="star star-twinkle" style="animation-delay: 0.2s;"/>
    <circle cx="210" cy="50" r="1" class="star star-twinkle" style="animation-delay: 1.5s;"/>
    <circle cx="340" cy="90" r="2" class="star star-twinkle" style="animation-delay: 2.5s;"/>
    <circle cx="510" cy="60" r="1.5" class="star star-twinkle" style="animation-delay: 0.8s;"/>
    <circle cx="690" cy="110" r="2.5" class="star star-twinkle" style="animation-delay: 3.2s;"/>
    <circle cx="120" cy="380" r="1" class="star star-twinkle" style="animation-delay: 1.1s;"/>
    <circle cx="270" cy="410" r="1.5" class="star star-twinkle" style="animation-delay: 2.1s;"/>
    <circle cx="560" cy="390" r="2" class="star star-twinkle" style="animation-delay: 0.5s;"/>
    <circle cx="720" cy="360" r="1" class="star star-twinkle" style="animation-delay: 1.8s;"/>
  </g>

  <!-- Ambient Light in Center of Portal -->
  <circle cx="360" cy="225" r="130" fill="url(#portal-glow)" opacity="0.5"/>

  <!-- Converging Paths from Left (Two paths representing separate hearts coming together) -->
  <g stroke="#ffb6c1" fill="none" stroke-width="1.5" opacity="0.6">
    <!-- Top left path -->
    <path d="M 50 100 Q 180 100 280 180 T 360 225" />
    <path d="M 50 100 Q 180 100 280 180 T 360 225" stroke="#ffd700" stroke-width="2.5" class="path-dash" filter="url(#glow)"/>

    <!-- Bottom left path -->
    <path d="M 50 350 Q 180 350 280 270 T 360 225" />
    <path d="M 50 350 Q 180 350 280 270 T 360 225" stroke="#ffd700" stroke-width="2.5" class="path-dash" style="animation-delay: -4s;" filter="url(#glow)"/>
  </g>

  <!-- Unified Output Beam going Right (Transformation) -->
  <g>
    <!-- Thick glowing beam -->
    <path d="M 360 225 L 750 225" stroke="url(#beam-grad)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M 360 225 L 750 225" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    
    <!-- Flowing particles along output beam -->
    <line x1="360" y1="225" x2="750" y2="225" stroke="#ffd700" stroke-width="2.5" stroke-dasharray="15, 60" class="path-dash" style="animation-delay: -2s;"/>
  </g>

  <!-- Transformation Portal (The Gate of Balance & Love) -->
  <g class="portal-pulse">
    <!-- Outer thick rings -->
    <circle cx="360" cy="225" r="75" fill="none" stroke="#da70d6" stroke-width="6" opacity="0.5"/>
    <circle cx="360" cy="225" r="75" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.9" filter="url(#glow)"/>

    <!-- Inner tech rotation ring -->
    <circle cx="360" cy="225" r="62" fill="none" stroke="#ffb6c1" stroke-width="1.5" stroke-dasharray="20, 10" class="portal-rotate"/>
    <circle cx="360" cy="225" r="50" fill="none" stroke="#da70d6" stroke-width="0.75" stroke-dasharray="5, 5" class="portal-rotate" style="animation-direction: reverse;"/>
  </g>

  <!-- Cosmic Flower Blooming at the exact focal point -->
  <g transform="translate(360, 225) scale(0.65)" class="portal-rotate" opacity="0.9">
    <!-- Flower Petals -->
    <path d="M 0 0 C -15 -30 -30 -40 0 -80 C 30 -40 15 -30 0 0 Z" fill="#ffd700" filter="url(#glow)"/>
    <path d="M 0 0 C -15 -30 -30 -40 0 -80 C 30 -40 15 -30 0 0 Z" fill="#ffb6c1" transform="rotate(72)"/>
    <path d="M 0 0 C -15 -30 -30 -40 0 -80 C 30 -40 15 -30 0 0 Z" fill="#da70d6" transform="rotate(144)"/>
    <path d="M 0 0 C -15 -30 -30 -40 0 -80 C 30 -40 15 -30 0 0 Z" fill="#ffb6c1" transform="rotate(216)"/>
    <path d="M 0 0 C -15 -30 -30 -40 0 -80 C 30 -40 15 -30 0 0 Z" fill="#da70d6" transform="rotate(288)"/>

    <!-- Flower Core -->
    <circle cx="0" cy="0" r="10" fill="#ffffff" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="4" fill="#ffd700"/>
  </g>

  <!-- Glowing Stardust drifting up from the flower (Transformation effects) -->
  <g class="stardust-rise" transform="translate(360, 210)" filter="url(#glow)">
    <circle cx="-25" cy="-20" r="2" fill="#ffd700"/>
    <circle cx="15" cy="-40" r="1.5" fill="#ffb6c1" style="animation-delay: 1.5s;"/>
    <circle cx="-5" cy="-60" r="2.5" fill="#ffd700" style="animation-delay: 3s;"/>
    <circle cx="30" cy="-15" r="1" fill="#da70d6" style="animation-delay: 2s;"/>
  </g>

  <!-- HUD text details -->
  <!-- Top Right Status Panel -->
  <g transform="translate(560, 60)" font-family="JetBrains Mono, Courier New, monospace" fill="#ffb6c1" font-size="10" opacity="0.85">
    <rect x="-10" y="-10" width="200" height="75" fill="none" stroke="#da70d6" stroke-width="1" opacity="0.4"/>
    <line x1="190" y1="-10" x2="190" y2="15" stroke="#ffd700" stroke-width="3"/>
    <text x="5" y="12" font-weight="bold" fill="#ffd700">INTEGRATION ENGINE STG.03</text>
    <text x="5" y="27">CONVERGENCE: SUCCESS</text>
    <text x="5" y="42">CORE SYMMETRY: 99.87%</text>
    <text x="5" y="57">EMOTIONAL FLOW: OPTIMAL</text>
  </g>

  <!-- Left Side Axis labels -->
  <g font-family="JetBrains Mono, Courier New, monospace" fill="#ffb6c1" font-size="9" opacity="0.6">
    <text x="50" y="85">PATHWAY A: SPONTANEOUS CURIOSITY</text>
    <text x="50" y="375">PATHWAY B: RESONANT AFFINITY</text>
  </g>

  <!-- Bottom HUD -->
  <g transform="translate(50, 410)">
    <line x1="0" y1="0" x2="700" y2="0" stroke="#da70d6" stroke-width="1" opacity="0.4"/>
    <text x="0" y="15" font-family="JetBrains Mono, Courier New, monospace" font-size="10" fill="#ffd700">TRANSFORMATION MATRIX STATUS: SYNCHRONIZED</text>
    <text x="700" y="15" font-family="JetBrains Mono, Courier New, monospace" font-size="10" fill="#ffb6c1" text-anchor="end">SYS.REV.08</text>
  </g>
</svg>
