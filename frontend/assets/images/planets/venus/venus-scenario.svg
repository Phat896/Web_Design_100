<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#22053c"/>
      <stop offset="60%" stop-color="#0f011e"/>
      <stop offset="100%" stop-color="#04000b"/>
    </radialGradient>

    <!-- Hologram Projection Glow -->
    <radialGradient id="holo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ffb6c1" stop-opacity="0.4"/>
      <stop offset="85%" stop-color="#da70d6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0f011e" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: url(#bg-grad); }
    .table-line { fill: none; stroke: #da70d6; stroke-width: 1.5; opacity: 0.6; }
    .holo-ray { fill: none; stroke: #ffd700; stroke-width: 0.75; opacity: 0.3; }
    .star { fill: #ffffff; opacity: 0.25; }
    
    /* Animations */
    .holo-spin { transform-origin: 400px 200px; animation: spin 20s linear infinite; }
    .holo-pulse { transform-origin: 400px 200px; animation: pulse 3.5s infinite ease-in-out; }
    .connection-flow { stroke-dasharray: 6, 20; animation: dash-flow 8s linear infinite; }
    .screen-flicker { animation: flicker 5s infinite step-end; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px #ffd700); }
      50% { transform: scale(1.08); filter: drop-shadow(0 0 15px #ffb6c1); }
    }
    @keyframes dash-flow {
      to { stroke-dashoffset: -100; }
    }
    @keyframes flicker {
      0%, 100% { opacity: 0.85; }
      95% { opacity: 0.3; }
      96% { opacity: 0.85; }
      98% { opacity: 0.1; }
      99% { opacity: 0.85; }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="450" class="bg"/>

  <!-- Starry ambient backdrop -->
  <g>
    <circle cx="80" cy="70" r="1" class="star"/>
    <circle cx="210" cy="40" r="1.5" class="star"/>
    <circle cx="680" cy="60" r="1" class="star"/>
    <circle cx="720" cy="110" r="2" class="star"/>
  </g>

  <!-- Futuristic Holographic Table structure (Isometric view) -->
  <g>
    <!-- Base Table Surface Oval -->
    <ellipse cx="400" cy="310" rx="320" ry="80" fill="#140026" stroke="#da70d6" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="400" cy="310" rx="300" ry="70" fill="none" stroke="#ffd700" stroke-width="0.75" opacity="0.3"/>
    
    <!-- Table Grid lines for sci-fi texture -->
    <ellipse cx="400" cy="310" rx="250" ry="55" fill="none" stroke="#da70d6" stroke-width="0.5" opacity="0.2"/>
    <ellipse cx="400" cy="310" rx="200" ry="40" fill="none" stroke="#da70d6" stroke-width="0.5" opacity="0.2"/>
    
    <!-- Diagonal table cross lines -->
    <line x1="100" y1="310" x2="700" y2="310" stroke="#da70d6" stroke-width="0.5" opacity="0.2"/>
    <line x1="400" y1="230" x2="400" y2="390" stroke="#da70d6" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Holographic Projection Rays from table center -->
  <g class="holo-pulse">
    <!-- Center light cone -->
    <polygon points="350,310 450,310 400,180" fill="url(#holo-glow)" opacity="0.7"/>
    <line x1="400" y1="310" x2="400" y2="180" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
    <line x1="370" y1="310" x2="400" y2="180" class="holo-ray"/>
    <line x1="430" y1="310" x2="400" y2="180" class="holo-ray"/>
  </g>

  <!-- Floating Hologram Planet Venus (Rotating) -->
  <g class="holo-spin">
    <!-- Floating orbital rings of hologram -->
    <circle cx="400" cy="200" r="48" fill="none" stroke="#da70d6" stroke-width="1" opacity="0.6"/>
    <circle cx="400" cy="200" r="40" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="10, 30" filter="url(#glow)"/>
    
    <!-- Mini holographic planet Venus -->
    <circle cx="400" cy="200" r="22" fill="#ffd700" opacity="0.3" filter="url(#glow)"/>
    <circle cx="400" cy="200" r="20" fill="none" stroke="#ffb6c1" stroke-width="1"/>
    
    <!-- Stardust particles surrounding hologram -->
    <circle cx="370" cy="180" r="2" fill="#ffd700"/>
    <circle cx="430" cy="220" r="1.5" fill="#ffb6c1"/>
    <circle cx="420" cy="170" r="2.5" fill="#da70d6"/>
    <circle cx="380" cy="225" r="1" fill="#ffd700"/>
  </g>

  <!-- LEFT SEATED PERSON SILHOUETTE (Collaborator 1) -->
  <g transform="translate(110, 210)">
    <!-- Chair profile -->
    <path d="M 0 160 L 20 100 L 50 100 L 40 160 Z" fill="#0c011b" stroke="#da70d6" stroke-width="1" opacity="0.5"/>
    
    <!-- Person silhouette -->
    <!-- Head -->
    <circle cx="50" cy="40" r="10" fill="#080012" stroke="#ffb6c1" stroke-width="1"/>
    <!-- Body -->
    <path d="M 35 120 L 40 60 Q 40 50 50 50 Q 60 50 62 60 L 68 120 Z" fill="#080012" stroke="#ffb6c1" stroke-width="1.5"/>
    <!-- Hands typing / gesturing -->
    <path d="M 58 75 Q 75 70 85 85" fill="none" stroke="#ffb6c1" stroke-width="1.5"/>
    
    <!-- Floating Virtual Screen in front of user -->
    <g class="screen-flicker">
      <rect x="75" y="25" width="60" height="40" rx="3" fill="#140026" stroke="#ffd700" stroke-width="1.5" opacity="0.8" transform="skewY(10)"/>
      <path d="M 82 37 L 112 37 M 82 47 L 128 47 M 82 57 L 102 57" stroke="#ffd700" stroke-width="1" opacity="0.6" transform="skewY(10)"/>
      <!-- Connection line from screen to hologram -->
      <path d="M 135 45 Q 220 100 350 200" fill="none" stroke="#ffd700" stroke-width="1" stroke-dasharray="3, 10" class="connection-flow"/>
    </g>
  </g>

  <!-- RIGHT SEATED PERSON SILHOUETTE (Collaborator 2) -->
  <g transform="translate(580, 210)">
    <!-- Chair profile -->
    <path d="M 110 160 L 90 100 L 60 100 L 70 160 Z" fill="#0c011b" stroke="#da70d6" stroke-width="1" opacity="0.5"/>
    
    <!-- Person silhouette -->
    <!-- Head -->
    <circle cx="60" cy="40" r="10" fill="#080012" stroke="#ffb6c1" stroke-width="1"/>
    <!-- Body -->
    <path d="M 75 120 L 70 60 Q 70 50 60 50 Q 50 50 48 60 L 42 120 Z" fill="#080012" stroke="#ffb6c1" stroke-width="1.5"/>
    <!-- Hands gesturing -->
    <path d="M 52 75 Q 35 70 25 85" fill="none" stroke="#ffb6c1" stroke-width="1.5"/>

    <!-- Floating Virtual Screen in front of user -->
    <g class="screen-flicker" style="animation-delay: 2.5s;">
      <rect x="-25" y="25" width="60" height="40" rx="3" fill="#140026" stroke="#ffb6c1" stroke-width="1.5" opacity="0.8" transform="skewY(-10)"/>
      <circle cx="5" cy="45" r="8" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.7" transform="skewY(-10)"/>
      <line x1="-15" y1="35" x2="20" y2="35" stroke="#ffb6c1" stroke-width="1" opacity="0.6" transform="skewY(-10)"/>
      <!-- Connection line from screen to hologram -->
      <path d="M -25 45 Q -100 100 -230 200" fill="none" stroke="#ffb6c1" stroke-width="1" stroke-dasharray="3, 10" class="connection-flow"/>
    </g>
  </g>

  <!-- Central Resonance wave bridging both parties (Connected Paths of Stardust) -->
  <path d="M 230 285 Q 400 220 570 285" fill="none" stroke="#ffd700" stroke-width="2.5" opacity="0.8" class="connection-flow" filter="url(#glow)"/>
  <!-- Floating heart icon at the center of connection wave -->
  <path d="M 400 240 C 395 235 385 235 380 240 C 375 235 365 235 360 240 C 355 245 360 255 380 265 C 400 255 405 245 400 240 Z" 
        fill="#ffb6c1" opacity="0.9" transform="translate(10, 5) scale(0.5)"/>

  <!-- Top Center Information HUD -->
  <g transform="translate(400, 45)" font-family="JetBrains Mono, Courier New, monospace" text-anchor="middle">
    <text x="0" y="0" font-size="13" font-weight="bold" fill="#ffd700" letter-spacing="3">COGNITIVE SYNERGY WORKSTATION</text>
    <text x="0" y="15" font-size="9" fill="#ffb6c1" letter-spacing="2">SCENARIO: HARMONIC IDEA BRAINSTORMING</text>
  </g>

  <!-- Left/Right Corner Tech details -->
  <g transform="translate(40, 50)" font-family="JetBrains Mono, Courier New, monospace" fill="#ffb6c1" font-size="8" opacity="0.7">
    <text x="0" y="0">ROOM CODE: VENUS-LAB-04</text>
    <text x="0" y="10">USER A: CONNECTED</text>
  </g>
  <g transform="translate(760, 50)" font-family="JetBrains Mono, Courier New, monospace" fill="#ffb6c1" font-size="8" text-anchor="end" opacity="0.7">
    <text x="0" y="0">STABILITY: 99.98%</text>
    <text x="0" y="10">USER B: CONNECTED</text>
  </g>

  <!-- Bottom Panel Info -->
  <g transform="translate(40, 415)" font-family="JetBrains Mono, Courier New, monospace" font-size="10" opacity="0.85">
    <text x="0" y="0" fill="#ffd700" font-weight="bold">COLLABORATIVE HUD // CURIOSITY INTEGRATION SCENARIO</text>
    <text x="720" y="0" fill="#ffb6c1" text-anchor="end">SYS.STATUS: OPERATIONAL</text>
  </g>
</svg>
