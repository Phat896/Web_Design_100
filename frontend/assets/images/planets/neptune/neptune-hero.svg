<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <radialGradient id="space" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#020a18"/>
      <stop offset="100%" stop-color="#01040a"/>
    </radialGradient>
    <radialGradient id="neptune-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="70%" stop-color="#1e3a8a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="planet-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="40%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    .star { fill: #ffffff; opacity: 0.6; animation: twinkle 3s infinite ease-in-out; }
    .star-1 { animation-delay: 0s; }
    .star-2 { animation-delay: 1s; }
    .star-3 { animation-delay: 2s; }
    .pulse { animation: pulseGlow 4s infinite ease-in-out; }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }
  </style>
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#space)" />
  
  <!-- Parallax Stars -->
  <circle cx="100" cy="80" r="1" class="star star-1" />
  <circle cx="250" cy="150" r="1.5" class="star star-2" />
  <circle cx="450" cy="50" r="1" class="star star-3" />
  <circle cx="600" cy="200" r="2" class="star star-1" />
  <circle cx="700" cy="100" r="1" class="star star-2" />
  <circle cx="150" cy="300" r="1.5" class="star star-3" />
  <circle cx="350" cy="350" r="1" class="star star-1" />
  <circle cx="550" cy="280" r="2" class="star star-2" />

  <!-- Nebula Glow -->
  <circle cx="550" cy="220" r="250" fill="url(#neptune-glow)" class="pulse" />
  
  <!-- Neptune Body -->
  <circle cx="550" cy="220" r="120" fill="url(#planet-grad)" filter="url(#glow)" />
  
  <!-- Planet Shadows & Details -->
  <path d="M 430,220 A 120,120 0 0,0 670,220 A 120,60 0 0,1 430,220 Z" fill="#000000" opacity="0.45" />
  <ellipse cx="550" cy="220" rx="150" ry="15" fill="none" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.3" transform="rotate(-15, 550, 220)" />

  <!-- Silhouette on ledge -->
  <path d="M 0,380 L 250,380 L 220,410 L 0,410 Z" fill="#0b1329" stroke="#1e293b" stroke-width="2" />
  <path d="M 0,410 L 220,410 L 180,450 L 0,450 Z" fill="#070a13" />
  
  <!-- Astronaut Standing -->
  <g transform="translate(160, 310) scale(0.6)">
    <!-- Body -->
    <rect x="25" y="45" width="20" height="35" rx="5" fill="#1e293b" stroke="#60a5fa" stroke-width="2" />
    <!-- Helmet -->
    <circle cx="35" cy="30" r="15" fill="#38bdf8" stroke="#60a5fa" stroke-width="2" />
    <path d="M 23,30 Q 35,18 47,30 Q 35,35 23,30 Z" fill="#0f172a" />
    <!-- Details -->
    <line x1="30" y1="55" x2="40" y2="55" stroke="#60a5fa" stroke-width="2" />
    <!-- Boots -->
    <rect x="23" y="80" width="10" height="8" rx="2" fill="#0f172a" />
    <rect x="37" y="80" width="10" height="8" rx="2" fill="#0f172a" />
  </g>
  
  <!-- Sci-Fi HUD Overlay -->
  <text x="30" y="40" font-family="'JetBrains Mono', monospace" font-size="12" fill="#60a5fa" letter-spacing="2">SYS.LOC: NEPTUNE // DEPTH: 4.5B KM</text>
  <text x="30" y="60" font-family="'JetBrains Mono', monospace" font-size="10" fill="#38bdf8" opacity="0.7">STATUS: SECURE // ATMOSPHERE: DETECTING</text>
  <line x1="30" y1="70" x2="250" y2="70" stroke="#60a5fa" stroke-width="1" opacity="0.3" />
</svg>
