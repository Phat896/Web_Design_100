<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#020818"/>
      <stop offset="100%" stop-color="#010307"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="strong-glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Brain Silhouette Outline -->
  <g transform="translate(180, 50)" stroke="#1e3a8a" stroke-width="2" fill="none">
    <!-- Cerebrum Outer -->
    <path d="M 220,50 Q 350,20 400,120 Q 450,220 400,280 Q 380,310 330,300 Q 310,330 250,330 Q 180,330 160,260 Q 100,250 80,180 Q 60,110 130,70 Q 170,50 220,50 Z" stroke="#3b82f6" stroke-width="3" filter="url(#glow)" />
    <!-- Cerebellum -->
    <path d="M 160,260 Q 180,350 250,350 Q 280,350 300,320" stroke="#1d4ed8" stroke-width="2" />
    <!-- Brain Stem -->
    <path d="M 280,320 L 280,390 L 310,390 L 310,315" stroke="#1d4ed8" stroke-width="2" />
    
    <!-- Internal Brain Connections (Fibers) -->
    <path d="M 130,120 Q 220,100 320,120" stroke="#1e3a8a" stroke-dasharray="3 3" />
    <path d="M 110,180 Q 220,180 350,180" stroke="#1e3a8a" stroke-dasharray="3 3" />
    <path d="M 150,230 Q 250,230 380,220" stroke="#1e3a8a" stroke-dasharray="3 3" />
    
    <!-- Amygdala (Highlighted Threat Center) -->
    <g transform="translate(230, 200)">
      <circle cx="0" cy="0" r="22" fill="#ef4444" fill-opacity="0.15" filter="url(#strong-glow)" />
      <circle cx="0" cy="0" r="12" fill="#f87171" filter="url(#glow)" />
      <circle cx="0" cy="0" r="5" fill="#ffffff" />
      <text x="32" y="5" font-family="'JetBrains Mono', monospace" font-size="12" fill="#f87171" font-weight="bold">AMYGDALA [ALERT]</text>
    </g>
    
    <!-- Hippocampus (Memory Link) -->
    <path d="M 230,220 Q 280,240 310,210" stroke="#06b6d4" stroke-width="3" filter="url(#glow)" fill="none" />
    <text x="320" y="235" font-family="'JetBrains Mono', monospace" font-size="10" fill="#22d3ee">HIPPOCAMPUS</text>
  </g>

  <!-- Labels -->
  <text x="40" y="50" font-family="'Outfit', sans-serif" font-size="18" font-weight="bold" fill="#60a5fa" letter-spacing="1">NEUROSCIENCE OF FEAR</text>
  <text x="40" y="75" font-family="'JetBrains Mono', monospace" font-size="11" fill="#38bdf8" opacity="0.8">FIGHT-OR-FLIGHT TRIGGER MECHANISM</text>
  <line x1="40" y1="85" x2="350" y2="85" stroke="#38bdf8" stroke-width="1" opacity="0.3" />
  
  <!-- Info Cards -->
  <rect x="40" y="110" width="220" height="90" rx="8" fill="#080e1e" stroke="#1e293b" stroke-width="1" />
  <text x="55" y="135" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">1. THREAT DETECTION</text>
  <text x="55" y="155" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">The Amygdala intercepts sensory</text>
  <text x="55" y="170" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">data and evaluates threat levels.</text>

  <rect x="40" y="215" width="220" height="90" rx="8" fill="#080e1e" stroke="#1e293b" stroke-width="1" />
  <text x="55" y="240" font-family="'Outfit', sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2. HORMONAL CASCADE</text>
  <text x="55" y="260" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">Triggers rapid adrenaline surge,</text>
  <text x="55" y="275" font-family="'Inter', sans-serif" font-size="10" fill="#94a3b8">increasing heart rate & breathing.</text>
</svg>
