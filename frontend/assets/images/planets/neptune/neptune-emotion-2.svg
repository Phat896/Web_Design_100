<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020813"/>
      <stop offset="100%" stop-color="#05162e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <style>
    .node { fill: #1e3a8a; stroke: #3b82f6; stroke-width: 2; transition: all 0.3s; }
    .node-isolated { fill: #090d16; stroke: #ef4444; stroke-width: 2; animation: alertPulse 2s infinite; }
    .connection { stroke: rgba(59, 130, 246, 0.4); stroke-width: 1.5; stroke-dasharray: 4 4; }
    .connection-broken { stroke: rgba(239, 68, 68, 0.2); stroke-width: 1.5; stroke-dasharray: 2 8; }
    @keyframes alertPulse {
      0%, 100% { stroke-color: #ef4444; filter: drop-shadow(0 0 2px rgba(239,68,68,0.4)); }
      50% { stroke-color: #f87171; filter: drop-shadow(0 0 8px rgba(239,68,68,0.8)); }
    }
  </style>
  <rect width="100%" height="100%" fill="url(#bg)" />
  
  <!-- Connected Nodes Group -->
  <line x1="200" y1="150" x2="350" y2="100" class="connection" />
  <line x1="350" y1="100" x2="500" y2="180" class="connection" />
  <line x1="200" y1="150" x2="280" y2="280" class="connection" />
  <line x1="280" y1="280" x2="450" y2="280" class="connection" />
  <line x1="450" y1="280" x2="500" y2="180" class="connection" />
  <line x1="350" y1="100" x2="280" y2="280" class="connection" />
  
  <!-- Broken Connections to Isolated Node -->
  <line x1="500" y1="180" x2="650" y2="200" class="connection-broken" />
  <line x1="450" y1="280" x2="650" y2="200" class="connection-broken" />
  
  <!-- Nodes -->
  <circle cx="200" cy="150" r="16" class="node" />
  <circle cx="350" cy="100" r="20" class="node" filter="url(#glow)" />
  <circle cx="500" cy="180" r="18" class="node" />
  <circle cx="280" cy="280" r="15" class="node" />
  <circle cx="450" cy="280" r="16" class="node" />
  
  <!-- Isolated Node -->
  <circle cx="650" cy="200" r="22" class="node-isolated" />
  
  <!-- Red X on broken connection indicator -->
  <g transform="translate(565, 175) scale(0.8)">
    <line x1="0" y1="0" x2="15" y2="15" stroke="#ef4444" stroke-width="2" />
    <line x1="15" y1="0" x2="0" y2="15" stroke="#ef4444" stroke-width="2" />
  </g>

  <text x="30" y="360" font-family="'Outfit', sans-serif" font-size="20" font-weight="bold" fill="#ef4444">FEAR OF REJECTION</text>
  <text x="30" y="380" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8">The painful anxiety of being cast outside the circle.</text>
</svg>
