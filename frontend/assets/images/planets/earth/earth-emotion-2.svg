<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020916" />
      <stop offset="60%" stop-color="#041629" />
      <stop offset="100%" stop-color="#08223b" />
    </linearGradient>
    <linearGradient id="waveBlueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.3" />
      <stop offset="40%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#4ade80" />
    </linearGradient>
    <linearGradient id="waveGreenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803d" stop-opacity="0.3" />
      <stop offset="40%" stop-color="#4ade80" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes nodePulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px #4ade80); }
      50% { transform: scale(1.1); filter: drop-shadow(0 0 15px #38bdf8); }
    }
    @keyframes lineFlow {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .hud-pulse { animation: pulse 3s infinite ease-in-out; }
    .rot-cw { animation: rotate 20s linear infinite; transform-origin: 400px 200px; }
    .rot-ccw { animation: rotate 15s linear infinite reverse; transform-origin: 400px 200px; }
    .node-anim { animation: nodePulse 4s infinite ease-in-out; transform-origin: 400px 200px; }
    .flow-path { animation: lineFlow 3s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Stars / Particles -->
  <g opacity="0.3">
    <circle cx="90" cy="80" r="1.2" fill="#ffffff" />
    <circle cx="210" cy="320" r="1" fill="#4ade80" />
    <circle cx="340" cy="60" r="1.5" fill="#38bdf8" />
    <circle cx="680" cy="90" r="1" fill="#ffffff" />
    <circle cx="710" cy="310" r="1.5" fill="#4ade80" />
  </g>

  <!-- Grid overlay -->
  <g stroke="#38bdf8" stroke-width="0.5" opacity="0.1">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="100" y1="0" x2="100" y2="450" />
    <line x1="200" y1="0" x2="200" y2="450" />
    <line x1="300" y1="0" x2="300" y2="450" />
    <line x1="400" y1="0" x2="400" y2="450" />
    <line x1="500" y1="0" x2="500" y2="450" />
    <line x1="600" y1="0" x2="600" y2="450" />
    <line x1="700" y1="0" x2="700" y2="450" />
  </g>

  <!-- Title HUD -->
  <g transform="translate(50, 45)" opacity="0.8">
    <text x="0" y="0" fill="#38bdf8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" letter-spacing="3">NEURAL EVOLUTION TIMELINE</text>
    <text x="0" y="16" fill="#4ade80" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9">METRIC: STABILITY MATRIX</text>
    <line x1="0" y1="24" x2="200" y2="24" stroke="#4ade80" stroke-width="1" />
  </g>

  <!-- Timeline axis details at bottom -->
  <g transform="translate(0, 360)">
    <!-- Main line -->
    <line x1="50" y1="0" x2="750" y2="0" stroke="#94a3b8" stroke-width="1.5" opacity="0.5" />
    
    <!-- Timeline markers and labels -->
    <!-- Point 1: Chaotic Origin -->
    <g transform="translate(150, 0)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#38bdf8" stroke-width="2" />
      <circle cx="0" cy="0" r="4" fill="#38bdf8" />
      <text x="0" y="24" text-anchor="middle" fill="#38bdf8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" font-weight="bold">PHASE 01: RAW EMOTION</text>
      <text x="0" y="36" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8">T-00:00 (CHAOS)</text>
    </g>

    <!-- Point 2: Alignment Node -->
    <g transform="translate(400, 0)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#4ade80" stroke-width="2" />
      <circle cx="0" cy="0" r="4" fill="#4ade80" />
      <text x="0" y="24" text-anchor="middle" fill="#4ade80" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" font-weight="bold">PHASE 02: DAMPENING</text>
      <text x="0" y="36" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8">T-02:40 (CONVERGENCE)</text>
    </g>

    <!-- Point 3: Stable Balance -->
    <g transform="translate(650, 0)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#38bdf8" stroke-width="2" />
      <circle cx="0" cy="0" r="4" fill="#38bdf8" />
      <text x="0" y="24" text-anchor="middle" fill="#38bdf8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" font-weight="bold">PHASE 03: BALANCED STATE</text>
      <text x="0" y="36" text-anchor="middle" fill="#94a3b8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8">T-05:00 (STABLE)</text>
    </g>
  </g>

  <!-- Background Glowing Portal / Convergence Ring at X=400 -->
  <g transform="translate(400, 200)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="80" fill="url(#nodeGlow)" filter="url(#strongGlow)" />
    
    <!-- Concentric HUD rings -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="10 15 5 15" class="rot-cw" />
    <circle cx="0" cy="0" r="55" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="20 40" class="rot-ccw" />
    <circle cx="0" cy="0" r="30" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.8" />
    <circle cx="0" cy="0" r="8" fill="#ffffff" filter="url(#glow)" />
    
    <!-- Vertical scanning beam -->
    <line x1="0" y1="-150" x2="0" y2="150" stroke="#4ade80" stroke-width="0.8" stroke-dasharray="4 4" opacity="0.6" />
    <circle cx="0" cy="-150" r="2.5" fill="#4ade80" />
    <circle cx="0" cy="150" r="2.5" fill="#4ade80" />
  </g>

  <!-- The Emotional Signal Waveforms (Chaotic -> Balanced) -->
  <!-- Wave 1 (Blue) -->
  <path d="M 50 180 
           Q 90 90, 130 220 
           T 210 160 
           T 290 230 
           T 370 200
           Q 385 200, 400 200
           Q 415 200, 430 200
           T 510 200 
           T 590 200 
           T 670 200 
           T 750 200" 
        fill="none" stroke="url(#waveBlueGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Wave 2 (Green, offset, smoother frequency settling) -->
  <path d="M 50 220 
           Q 90 280, 130 180 
           T 210 240 
           T 290 170 
           T 370 200
           Q 385 200, 400 200
           Q 415 200, 430 200
           Q 470 160, 510 200
           Q 550 240, 590 200
           Q 630 160, 670 200
           Q 710 240, 750 200" 
        fill="none" stroke="url(#waveGreenGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Superimposed Harmonized Sine Waves on the Balanced Right Side -->
  <g opacity="0.8" filter="url(#glow)">
    <!-- Blue balanced line -->
    <path d="M 430 200 Q 470 170, 510 200 T 590 200 T 670 200 T 750 200" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="5 5" class="flow-path" />
    <!-- Green balanced line -->
    <path d="M 430 200 Q 470 230, 510 200 T 590 200 T 670 200 T 750 200" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="10 5" class="flow-path" style="animation-delay: 1.5s;" />
  </g>

  <!-- HUD Panel (Top Right) -->
  <g transform="translate(560, 40)" class="hud-pulse">
    <rect width="190" height="65" rx="5" fill="#081b33" fill-opacity="0.6" stroke="#38bdf8" stroke-width="1" />
    <text x="15" y="20" fill="#4ade80" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" font-weight="bold">CONVERGENT ANALYZER</text>
    <text x="15" y="38" fill="#ffffff" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12">STABILITY: 99.9%</text>
    <text x="15" y="52" fill="#94a3b8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8">DAMPING COEFF: 1.442/s</text>
    <!-- Status indicator -->
    <circle cx="170" cy="35" r="4" fill="#4ade80" />
  </g>
</svg>
