<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="skyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020914" />
      <stop offset="100%" stop-color="#04182f" />
    </linearGradient>
    <linearGradient id="waterBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#041a33" />
      <stop offset="100%" stop-color="#082b49" />
    </linearGradient>
    <radialGradient id="haloGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <!-- Filters -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="waterRipple" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.1" numOctaves="2" result="wave" />
      <feDisplacementMap in="SourceGraphic" in2="wave" scale="6" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }
    @keyframes slowWave {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    @keyframes rippleAnim {
      0% { transform: scaleX(0.8); opacity: 0.8; }
      50% { opacity: 0.4; }
      100% { transform: scaleX(1.2); opacity: 0; }
    }
    .hud-pulse { animation: pulse 3s infinite ease-in-out; }
    .float-slow { animation: slowWave 6s infinite ease-in-out; }
    .ripple-effect { animation: rippleAnim 4s infinite linear; transform-origin: 400px 245px; }
  </style>

  <!-- Sky Area -->
  <rect width="800" height="240" fill="url(#skyBg)" />
  
  <!-- Water reflection Area -->
  <rect y="240" width="800" height="210" fill="url(#waterBg)" />

  <!-- Stars in the sky -->
  <g opacity="0.3">
    <circle cx="75" cy="50" r="1" fill="#ffffff" />
    <circle cx="210" cy="90" r="1.5" fill="#4ade80" />
    <circle cx="320" cy="40" r="1" fill="#38bdf8" />
    <circle cx="680" cy="60" r="1" fill="#ffffff" />
    <circle cx="710" cy="110" r="1.2" fill="#4ade80" />
  </g>

  <!-- Large Conscious Balance Halo in the sky (The Tree of Light / Concentric Circles) -->
  <g class="float-slow" filter="url(#glow)">
    <circle cx="400" cy="110" r="90" fill="url(#haloGlow)" />
    <!-- Concentric thin paths -->
    <circle cx="400" cy="110" r="70" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="10 20" />
    <circle cx="400" cy="110" r="60" fill="none" stroke="#38bdf8" stroke-width="1.5" />
    <circle cx="400" cy="110" r="45" fill="none" stroke="#4ade80" stroke-width="1.2" stroke-dasharray="5 5" />
    
    <!-- Abstract Tree of Light inside the halo -->
    <g stroke="#ffffff" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.8">
      <!-- Trunk -->
      <line x1="400" y1="150" x2="400" y2="100" stroke="#4ade80" stroke-width="2" />
      <!-- Branches -->
      <path d="M 400 130 Q 380 115, 365 110" />
      <path d="M 400 130 Q 420 115, 435 110" />
      <path d="M 400 115 Q 375 100, 370 85" />
      <path d="M 400 115 Q 425 100, 430 85" />
      <path d="M 400 100 L 400 75" />
      
      <!-- Leaf nodes -->
      <circle cx="365" cy="110" r="2.5" fill="#38bdf8" />
      <circle cx="435" cy="110" r="2.5" fill="#4ade80" />
      <circle cx="370" cy="85" r="3" fill="#4ade80" />
      <circle cx="430" cy="85" r="3" fill="#38bdf8" />
      <circle cx="400" cy="75" r="3" fill="#ffffff" />
    </g>
  </g>

  <!-- Horizon Ground Line (Shoreline) -->
  <path d="M 0 240 Q 200 238, 400 240 T 800 240" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.5" />
  
  <!-- Silhouette of rocky ledge in the center -->
  <path d="M 340 240 Q 400 232, 460 240 L 430 248 L 370 248 Z" fill="#091829" stroke="#4ade80" stroke-width="1" />

  <!-- Astronaut Standing Silhouette (Real) -->
  <g transform="translate(400, 237) scale(0.95)">
    <!-- Suit structure -->
    <!-- Legs -->
    <rect x="-5" y="-18" width="4" height="18" fill="#040d1a" stroke="#38bdf8" stroke-width="0.5" />
    <rect x="1" y="-18" width="4" height="18" fill="#040d1a" stroke="#38bdf8" stroke-width="0.5" />
    <!-- Torso -->
    <rect x="-7" y="-36" width="14" height="19" rx="2" fill="#040d1a" stroke="#38bdf8" stroke-width="0.5" />
    <!-- Helmet -->
    <circle cx="0" cy="-43" r="6.5" fill="#040d1a" stroke="#38bdf8" stroke-width="0.5" />
    <!-- Visor -->
    <path d="M -3 -44 Q 0 -47, 3 -44 Q 4 -41, 0 -39 Q -4 -41, -3 -44 Z" fill="#38bdf8" filter="url(#glow)" />
  </g>

  <!-- Reflection in water -->
  <g filter="url(#waterRipple)" opacity="0.8">
    <!-- Reflected Conscious Halo -->
    <g transform="translate(0, 370) scale(1, -1)" opacity="0.6">
      <circle cx="400" cy="110" r="90" fill="url(#haloGlow)" />
      <circle cx="400" cy="110" r="70" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="10 20" />
      <circle cx="400" cy="110" r="60" fill="none" stroke="#38bdf8" stroke-width="1.5" />
      
      <g stroke="#ffffff" stroke-width="1.2" fill="none" stroke-linecap="round">
        <line x1="400" y1="150" x2="400" y2="100" stroke="#4ade80" stroke-width="2" />
        <path d="M 400 130 Q 380 115, 365 110" />
        <path d="M 400 130 Q 420 115, 435 110" />
        <circle cx="365" cy="110" r="2" fill="#38bdf8" />
        <circle cx="435" cy="110" r="2" fill="#4ade80" />
      </g>
    </g>

    <!-- Reflected Astronaut Silhouette -->
    <g transform="translate(400, 245) scale(0.95, -0.9)">
      <rect x="-5" y="-18" width="4" height="18" fill="none" stroke="#4ade80" stroke-width="1" />
      <rect x="1" y="-18" width="4" height="18" fill="none" stroke="#4ade80" stroke-width="1" />
      <rect x="-7" y="-36" width="14" height="19" rx="2" fill="none" stroke="#4ade80" stroke-width="1" />
      <circle cx="0" cy="-43" r="6.5" fill="none" stroke="#38bdf8" stroke-width="1" />
      
      <!-- Inner glowing energy cores -->
      <circle cx="0" cy="-26" r="3" fill="#38bdf8" />
      <circle cx="0" cy="-43" r="2.5" fill="#4ade80" />
    </g>
  </g>

  <!-- Water Ripple concentric lines -->
  <ellipse cx="400" cy="245" rx="50" ry="6" fill="none" stroke="#38bdf8" stroke-width="1" class="ripple-effect" />
  <ellipse cx="400" cy="245" rx="100" ry="12" fill="none" stroke="#4ade80" stroke-width="0.8" class="ripple-effect" style="animation-delay: 1.5s;" />
  <ellipse cx="400" cy="245" rx="180" ry="20" fill="none" stroke="#38bdf8" stroke-width="0.5" class="ripple-effect" style="animation-delay: 3s;" />

  <!-- Shore cyber grass nodes -->
  <g stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M 310 240 L 315 220" /> <circle cx="315" cy="220" r="2" fill="#4ade80" />
    <path d="M 325 240 L 322 225" />
    <path d="M 475 240 L 472 220" /> <circle cx="472" cy="220" r="2" fill="#4ade80" />
    <path d="M 490 240 L 495 228" />
  </g>

  <!-- HUD Interface elements -->
  <g transform="translate(580, 40)" class="hud-pulse">
    <rect width="180" height="60" rx="4" fill="#081b33" fill-opacity="0.6" stroke="#38bdf8" stroke-width="1" />
    <text x="12" y="18" fill="#4ade80" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9" letter-spacing="1">SELF-REFLECTIVE SCAN</text>
    <text x="12" y="34" fill="#ffffff" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" font-weight="bold">RATIO: 1.00 (BALANCE)</text>
    <text x="12" y="48" fill="#94a3b8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8">ECHO RANGE: 420nm - 540nm</text>
  </g>

  <!-- Bottom Left Panel -->
  <g transform="translate(40, 370)" opacity="0.7">
    <text x="0" y="0" fill="#38bdf8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" letter-spacing="2">SYS.LOC: INTEGRATION CHASM</text>
    <text x="0" y="15" fill="#4ade80" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="9">ECOLOGICAL FEEDBACK: HARMONIOUS</text>
    <line x1="0" y1="22" x2="160" y2="22" stroke="#38bdf8" stroke-width="1" />
  </g>
</svg>
