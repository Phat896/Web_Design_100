<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020916" />
      <stop offset="50%" stop-color="#081b33" />
      <stop offset="100%" stop-color="#0b2b40" />
    </linearGradient>
    <radialGradient id="nebulaBlue" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="nebulaGreen" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="earthAtmosphere" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#1e293b" stop-opacity="0" />
      <stop offset="96%" stop-color="#38bdf8" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.9" />
    </radialGradient>
    <radialGradient id="earthBody" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1d4ed8" />
      <stop offset="40%" stop-color="#0369a1" />
      <stop offset="75%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <linearGradient id="hudGradBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="hudGradGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.2" />
    </linearGradient>
    <linearGradient id="astroGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <!-- Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(1.5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinCounter {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.75; }
    }
    @keyframes pulseFast {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.9; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    @keyframes starTwinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* Classes */
    .star-t1 { animation: starTwinkle 3s infinite ease-in-out; transform-origin: center; }
    .star-t2 { animation: starTwinkle 4s infinite ease-in-out 1s; transform-origin: center; }
    .star-t3 { animation: starTwinkle 5s infinite ease-in-out 2s; transform-origin: center; }
    .floating-astronaut { animation: float 6s infinite ease-in-out; transform-origin: 220px 225px; }
    .hud-spin-cw { animation: spinClockwise 25s linear infinite; transform-origin: 550px 225px; }
    .hud-spin-ccw { animation: spinCounter 35s linear infinite; transform-origin: 550px 225px; }
    .hud-pulse { animation: pulse 4s infinite ease-in-out; }
    .hud-pulse-fast { animation: pulseFast 2s infinite ease-in-out; }
    .blinking-dot { animation: blink 1.5s infinite steps(1); }
  </style>

  <!-- Space Background -->
  <rect width="800" height="450" fill="url(#spaceBg)" />
  
  <!-- Nebulae -->
  <rect width="800" height="450" fill="url(#nebulaBlue)" />
  <rect width="800" height="450" fill="url(#nebulaGreen)" />

  <!-- Stars -->
  <g id="stars">
    <circle cx="75" cy="80" r="1.5" fill="#ffffff" class="star-t1" />
    <circle cx="120" cy="320" r="1" fill="#4ade80" class="star-t2" />
    <circle cx="280" cy="90" r="2" fill="#38bdf8" class="star-t3" />
    <circle cx="340" cy="390" r="1.5" fill="#ffffff" class="star-t1" />
    <circle cx="480" cy="60" r="1" fill="#4ade80" class="star-t2" />
    <circle cx="680" cy="110" r="2.5" fill="#ffffff" class="star-t3" />
    <circle cx="720" cy="350" r="1.5" fill="#38bdf8" class="star-t1" />
    <circle cx="50" cy="240" r="1" fill="#ffffff" class="star-t2" />
    <circle cx="610" cy="380" r="2.2" fill="#ffffff" class="star-t3" />
    <circle cx="210" cy="410" r="1.2" fill="#4ade80" class="star-t2" />
  </g>

  <!-- Deep Space Waves / Planetary Rings / Balance Resonance Rings -->
  <g opacity="0.3" class="hud-pulse">
    <ellipse cx="550" cy="225" rx="280" ry="140" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="8 16" transform="rotate(-15 550 225)" />
    <ellipse cx="550" cy="225" rx="320" ry="160" fill="none" stroke="#4ade80" stroke-width="0.5" transform="rotate(-15 550 225)" />
  </g>

  <!-- Outer HUD Ring for Earth -->
  <g class="hud-spin-cw" opacity="0.4">
    <circle cx="550" cy="225" r="190" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="10 40 100 40" />
    <circle cx="550" cy="225" r="195" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="4 8" />
  </g>
  <g class="hud-spin-ccw" opacity="0.3">
    <circle cx="550" cy="225" r="175" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="200 40 50 40" />
  </g>

  <!-- The Earth Sphere -->
  <g id="earth-group">
    <!-- Atmosphere Glow -->
    <circle cx="550" cy="225" r="150" fill="url(#earthAtmosphere)" filter="url(#strongGlow)" />
    <!-- Earth Base Body -->
    <circle cx="550" cy="225" r="148" fill="url(#earthBody)" />
    
    <!-- stylized green landmasses (curved balance shapes) -->
    <g opacity="0.75" filter="url(#glow)">
      <!-- Landmass 1 -->
      <path d="M 450 180 C 470 150, 520 140, 530 160 C 540 180, 500 210, 490 230 C 480 250, 520 280, 500 310 C 480 340, 430 310, 420 280 C 410 250, 430 210, 450 180 Z" fill="#4ade80" opacity="0.65" />
      <!-- Landmass 2 -->
      <path d="M 600 120 C 640 110, 680 130, 670 160 C 660 190, 610 170, 590 200 C 570 230, 620 250, 610 290 C 600 330, 550 350, 540 310 C 530 270, 560 250, 570 210 C 580 170, 560 130, 600 120 Z" fill="#4ade80" opacity="0.7" />
      <!-- Landmass 3 -->
      <circle cx="510" cy="110" r="10" fill="#4ade80" opacity="0.8" />
      <circle cx="460" cy="340" r="15" fill="#4ade80" opacity="0.6" />
      <path d="M 620 330 Q 640 310, 660 340 T 680 320 Q 690 350, 650 360 Z" fill="#4ade80" opacity="0.7" />
    </g>

    <!-- Holographic Coordinate Overlay grid -->
    <g opacity="0.35" stroke="#38bdf8" stroke-width="0.8" fill="none">
      <!-- Latitude Grid -->
      <ellipse cx="550" cy="225" rx="148" ry="40" />
      <ellipse cx="550" cy="225" rx="148" ry="85" />
      <ellipse cx="550" cy="225" rx="148" ry="120" />
      <!-- Longitude Grid -->
      <path d="M 550 77 A 148 148 0 0 0 550 373" />
      <path d="M 550 77 A 100 148 0 0 0 550 373" />
      <path d="M 550 77 A 50 148 0 0 0 550 373" />
      <path d="M 550 77 A 50 148 0 0 1 550 373" />
      <path d="M 550 77 A 100 148 0 0 1 550 373" />
    </g>
  </g>

  <!-- Astronaut (Floating Left) -->
  <g class="floating-astronaut" transform="translate(0, 0)">
    <!-- Connection Tether -->
    <path d="M -50 250 Q 50 180, 120 230 T 210 245" fill="none" stroke="#38bdf8" stroke-dasharray="3 5" opacity="0.4" />
    
    <!-- Astronaut Body -->
    <g transform="translate(160, 180)">
      <!-- Jetpack -->
      <rect x="15" y="25" width="20" height="45" rx="5" fill="#475569" stroke="#64748b" stroke-width="1.5" />
      <path d="M 10 35 L 15 38 L 15 58 L 10 61 Z" fill="#334155" />
      <!-- Left Booster Fire -->
      <path d="M 20 70 Q 25 85, 22 95 Q 15 85, 20 70 Z" fill="#38bdf8" opacity="0.8" filter="url(#glow)" />
      
      <!-- Suit -->
      <!-- Legs -->
      <rect x="25" y="70" width="12" height="25" rx="4" fill="url(#astroGrad)" stroke="#475569" stroke-width="1.5" />
      <rect x="43" y="68" width="12" height="25" rx="4" fill="url(#astroGrad)" stroke="#475569" stroke-width="1.5" />
      <!-- Boots -->
      <path d="M 23 95 H 37 V 98 Q 30 101, 23 98 Z" fill="#334155" />
      <path d="M 41 93 H 55 V 96 Q 48 99, 41 96 Z" fill="#334155" />
      <!-- Arms -->
      <!-- Right Arm raised to point at planet -->
      <path d="M 55 35 Q 75 32, 85 20 Q 88 22, 85 28 Q 75 42, 55 45 Z" fill="url(#astroGrad)" stroke="#475569" stroke-width="1.5" />
      <!-- Left Arm resting -->
      <path d="M 25 35 Q 10 40, 15 55 Q 20 58, 25 45 Z" fill="url(#astroGrad)" stroke="#475569" stroke-width="1.5" />
      
      <!-- Torso -->
      <rect x="25" y="30" width="30" height="42" rx="8" fill="url(#astroGrad)" stroke="#475569" stroke-width="1.5" />
      <!-- Torso Control Panel -->
      <rect x="31" y="38" width="18" height="18" rx="2" fill="#1e293b" />
      <circle cx="36" cy="43" r="2" fill="#4ade80" class="blinking-dot" />
      <circle cx="44" cy="43" r="2" fill="#38bdf8" />
      <rect x="34" y="49" width="12" height="3" fill="#64748b" />
      
      <!-- Helmet -->
      <circle cx="40" cy="20" r="16" fill="url(#astroGrad)" stroke="#475569" stroke-width="1.5" />
      <!-- Visor -->
      <path d="M 30 18 Q 40 10, 52 18 Q 54 26, 40 30 Q 28 25, 30 18 Z" fill="#0f172a" stroke="#38bdf8" stroke-width="1" />
      <!-- Visor Reflection -->
      <path d="M 32 17 Q 38 12, 46 16 Q 40 19, 32 17 Z" fill="#38bdf8" opacity="0.6" filter="url(#glow)" />
      
      <!-- Shoulder stripes -->
      <path d="M 26 34 Q 30 31, 35 32" stroke="#4ade80" stroke-width="2" fill="none" />
      <path d="M 54 34 Q 50 31, 45 32" stroke="#4ade80" stroke-width="2" fill="none" />
    </g>
  </g>

  <!-- Floating HUD Panel (Bottom Left) -->
  <g transform="translate(40, 300)" class="hud-pulse">
    <!-- Panel Glass Background -->
    <rect width="260" height="110" rx="6" fill="#081b33" fill-opacity="0.6" stroke="url(#hudGradBlue)" stroke-width="1.5" />
    <!-- Tech corners -->
    <path d="M 0 15 L 0 0 L 15 0" fill="none" stroke="#4ade80" stroke-width="3" />
    <path d="M 260 95 L 260 110 L 245 110" fill="none" stroke="#4ade80" stroke-width="3" />
    
    <!-- Connection lines -->
    <line x1="260" y1="55" x2="310" y2="55" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4 4" />
    <circle cx="310" cy="55" r="3" fill="#38bdf8" />
    
    <!-- Text Elements -->
    <text x="20" y="25" fill="#4ade80" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="12" letter-spacing="1">OBJECTIVE: BALANCE</text>
    <text x="20" y="45" fill="#ffffff" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="bold" letter-spacing="0.5">PLANET EARTH-03</text>
    <text x="20" y="68" fill="#94a3b8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10">SYS.STATUS: SYNCHRONIZED</text>
    
    <!-- Bar charts -->
    <text x="20" y="88" fill="#38bdf8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10">ECO-SYS</text>
    <rect x="70" y="80" width="100" height="8" rx="2" fill="#0f172a" />
    <rect x="70" y="80" width="85" height="8" rx="2" fill="#38bdf8" />
    
    <text x="180" y="88" fill="#4ade80" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10">98.6%</text>
  </g>

  <!-- Circular Scanning HUD (Top Right) -->
  <g transform="translate(720, 70)" class="hud-pulse-fast">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="5 15" />
    <circle cx="0" cy="0" r="20" fill="none" stroke="#38bdf8" stroke-width="1" />
    <line x1="-35" y1="0" x2="35" y2="0" stroke="#38bdf8" stroke-width="0.5" />
    <line x1="0" y1="-35" x2="0" y2="35" stroke="#38bdf8" stroke-width="0.5" />
    <text x="35" y="5" fill="#38bdf8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="8">SCN // 0.89</text>
  </g>

  <!-- Fine HUD Overlay grid and data -->
  <g transform="translate(400, 30)" opacity="0.8">
    <text x="0" y="0" text-anchor="middle" fill="#38bdf8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" letter-spacing="4">NEURAL EMOTIONAL STABILIZER SYSTEM</text>
    <line x1="-150" y1="8" x2="150" y2="8" stroke="url(#hudGradGreen)" stroke-width="1" />
    <circle cx="0" cy="8" r="2" fill="#4ade80" />
  </g>

  <!-- Bottom Coordinates -->
  <text x="760" y="430" text-anchor="end" fill="#94a3b8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" opacity="0.6">COORD: 03.15.54.E // AZIMUTH: 180.45</text>
  <text x="40" y="430" fill="#94a3b8" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="10" opacity="0.6">STABLE GRAVITY GRID // 1.0G</text>
</svg>
