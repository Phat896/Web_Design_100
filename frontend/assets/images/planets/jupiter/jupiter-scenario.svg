<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1b1207" />
      <stop offset="60%" stop-color="#070502" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Hologram Glow -->
    <radialGradient id="holo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0" />
    </radialGradient>

    <!-- Spot Light Glow -->
    <linearGradient id="spotlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse-holo {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0.95; }
    }
    @keyframes grid-scroll {
      0% { stroke-dashoffset: 40; }
      100% { stroke-dashoffset: 0; }
    }
    .holo-element { animation: pulse-holo 4s infinite ease-in-out; }
    .scroll-grid { stroke-dasharray: 8 4; animation: grid-scroll 12s infinite linear; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)" />

  <!-- Stage Spotlight -->
  <polygon points="400,0 280,380 520,380" fill="url(#spotlight)" opacity="0.8" />
  
  <!-- Holographic Floating Screen Background -->
  <rect x="150" y="60" width="500" height="250" fill="url(#holo-glow)" stroke="#fbbf24" stroke-width="1.5" rx="6" class="holo-element" />
  <line x1="150" y1="95" x2="650" y2="95" stroke="#fbbf24" stroke-width="1" class="holo-element" />

  <!-- Hologram Content: Core Planetary Data & Charts -->
  <g class="holo-element" transform="translate(150, 60)" stroke="#fb923c" fill="none" stroke-width="1">
    <!-- Grid on screen -->
    <path d="M 30,50 L 470,50 M 30,100 L 470,100 M 30,150 L 470,150 M 30,200 L 470,200" stroke="#b45309" stroke-width="0.5" opacity="0.3" />
    <path d="M 100,50 L 100,230 M 200,50 L 200,230 M 300,50 L 300,230 M 400,50 L 400,230" stroke="#b45309" stroke-width="0.5" opacity="0.3" />

    <!-- Waveform Chart (Success/Growth Metrics) -->
    <path d="M 40,210 L 100,180 L 180,195 L 260,110 L 340,140 L 420,70 L 460,85" stroke="#fef08a" stroke-width="2.5" filter="url(#glow)" />
    <!-- Small dots on wave -->
    <circle cx="100" cy="180" r="3" fill="#ffffff" />
    <circle cx="260" cy="110" r="3" fill="#ffffff" />
    <circle cx="420" cy="70" r="3" fill="#ffffff" />

    <!-- Holographic wireframe planet (Jupiter) -->
    <circle cx="410" cy="160" r="35" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="2,3" />
    <ellipse cx="410" cy="160" rx="35" ry="10" stroke="#fbbf24" stroke-width="1" />
    <ellipse cx="410" cy="160" rx="65" ry="12" stroke="#fef08a" stroke-width="1" opacity="0.8" />

    <!-- Hologram text inside screen -->
    <text x="30" y="25" font-family="JetBrains Mono, monospace" font-size="10" fill="#fef08a" stroke="none" font-weight="bold">PROJECT RADIANCE // CONFIDENCE OVERVIEW</text>
    <text x="40" y="80" font-family="JetBrains Mono, monospace" font-size="8" fill="#fb923c" stroke="none">TARGET ACQUISITION: 100%</text>
    <text x="40" y="95" font-family="JetBrains Mono, monospace" font-size="8" fill="#fbbf24" stroke="none">GROWTH EFFICIENCY: +45.8%</text>
  </g>

  <!-- Stage Floor / Speaker Platform -->
  <polygon points="100,450 180,380 620,380 700,450" fill="#0c0702" stroke="#fbbf24" stroke-width="2" />

  <!-- Speaker Silhouette (Confidence Scenario) -->
  <!-- The presenter gesturing with confidence, hand holding a remote or pointing to hologram -->
  <g transform="translate(400, 310)">
    <!-- Shadow -->
    <ellipse cx="0" cy="75" rx="25" ry="6" fill="#000000" opacity="0.8" />
    
    <!-- Body / Suit -->
    <path d="M -15 25 L -20 75 L 20 75 L 15 25 L 18 35 L 30 25 C 32 20, 25 15, 12 18 L 8 20 L 8 10 L -8 10 L -8 20 L -12 18 C -25 15, -32 20, -30 25 L -18 35 Z" fill="#120c05" stroke="#fb923c" stroke-width="1.5" />
    <!-- Left Hand pointing to screen -->
    <circle cx="33" cy="22" r="3.5" fill="#fef08a" filter="url(#glow)" />
    <!-- Head -->
    <circle cx="0" cy="-2" r="8" fill="#120c05" stroke="#fb923c" stroke-width="1.5" />
    <!-- Visor -->
    <path d="M -5 -3 A 4 4 0 0 1 5 -3 Z" fill="#fef08a" />
    
    <!-- Pod / Lectern in front of speaker (Sci-fi hologram control stand) -->
    <g transform="translate(0, 45)" stroke="#fbbf24" fill="none" stroke-width="1.5">
      <line x1="-30" y1="0" x2="30" y2="0" />
      <polyline points="-15,0 -5,30 5,30 15,0" />
      <ellipse cx="0" cy="0" rx="10" ry="3" fill="#ea580c" opacity="0.5" />
    </g>
  </g>

  <!-- HUD overlay detailing scenario parameters (Vocal Resonance, Pulse) -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#fbbf24" opacity="0.8">
    <!-- Speaker Bio metrics -->
    <rect x="40" y="320" width="180" height="75" fill="#120c04" stroke="#fb923c" stroke-width="1.5" rx="3" />
    <text x="50" y="338" font-weight="bold" fill="#fef08a">BIOMETRICS: LOCKED</text>
    <text x="50" y="352">PULSE: 68 BPM (CALM)</text>
    <text x="50" y="366">VIBRATIONAL STATS: 99.1%</text>
    <text x="50" y="380">STRESS INDEX: 0.04</text>
    <line x1="180" y1="330" x2="210" y2="330" stroke="#fbbf24" stroke-width="1" />

    <!-- Audience/Environment metrics -->
    <rect x="580" y="320" width="180" height="75" fill="#120c04" stroke="#fb923c" stroke-width="1.5" rx="3" />
    <text x="590" y="338" font-weight="bold" fill="#fef08a">ENVIRONMENT: ACTIVE</text>
    <text x="590" y="352">ENGAGEMENT: 98.2%</text>
    <text x="590" y="366">FEEDBACK SYNC: OPTIMAL</text>
    <text x="590" y="380">SOUND PRESSURE: 72 dB</text>
    <line x1="590" y1="385" x2="750" y2="385" stroke="#fbbf24" stroke-width="1" />
  </g>

  <!-- Title top middle -->
  <g font-family="JetBrains Mono, monospace" text-anchor="middle" fill="#ffffff">
    <text x="400" y="35" font-size="12" font-weight="bold" letter-spacing="3">SCENARIO: COMMAND PRESENTATION</text>
    <text x="400" y="48" fill="#fb923c" font-size="8">SCENIC SIMULATION // EMPOWERED EXPRESSION</text>
  </g>

  <!-- Brackets -->
  <path d="M 15 30 L 15 15 L 30 15" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 785 30 L 785 15 L 770 15" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 15 420 L 15 435 L 30 435" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 785 420 L 785 435 L 770 435" fill="none" stroke="#fbbf24" stroke-width="2" />
</svg>
