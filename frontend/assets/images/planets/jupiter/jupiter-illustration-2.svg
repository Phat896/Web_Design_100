<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1e1408" />
      <stop offset="60%" stop-color="#090603" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Mirror Portal Glow -->
    <radialGradient id="portal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fef08a" stop-opacity="1" />
      <stop offset="40%" stop-color="#fbbf24" stop-opacity="0.8" />
      <stop offset="85%" stop-color="#ea580c" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#7c2d12" stop-opacity="0" />
    </radialGradient>

    <!-- Silhouette Reflection Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="heavy-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes mirror-shimmer {
      0%, 100% { opacity: 0.8; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); }
    }
    @keyframes float-light {
      0%, 100% { transform: translateY(0) rotate(0); }
      50% { transform: translateY(-10px) rotate(5deg); }
    }
    .mirror-aura { animation: mirror-shimmer 5s infinite ease-in-out; transform-origin: 400px 200px; }
    .floating-hud { animation: float-light 6s infinite ease-in-out; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)" />

  <!-- Twinkling Star Sparks -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="80" cy="90" r="1" />
    <circle cx="230" cy="50" r="1.5" />
    <circle cx="700" cy="80" r="1.2" />
    <circle cx="750" cy="300" r="1.5" />
    <circle cx="120" cy="320" r="1" />
  </g>

  <!-- Giant Columns of Light rising in background -->
  <path d="M 380 450 L 395 0 L 405 0 L 420 450 Z" fill="#fb923c" opacity="0.15" filter="url(#heavy-glow)" />
  <path d="M 220 450 L 250 0 L 270 0 L 300 450 Z" fill="#fbbf24" opacity="0.1" filter="url(#heavy-glow)" />
  <path d="M 500 450 L 530 0 L 550 0 L 580 450 Z" fill="#fbbf24" opacity="0.1" filter="url(#heavy-glow)" />

  <!-- Deep Mirror/Portal representing the Inner Self Reflection -->
  <g class="mirror-aura">
    <!-- Outer Rings -->
    <ellipse cx="400" cy="200" rx="190" ry="190" fill="none" stroke="#ea580c" stroke-width="1.5" opacity="0.4" />
    <ellipse cx="400" cy="200" rx="170" ry="170" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.7" stroke-dasharray="10 5" />
    <ellipse cx="400" cy="200" rx="150" ry="150" fill="url(#portal-glow)" filter="url(#heavy-glow)" />
    
    <!-- Geometric ticks on mirror -->
    <circle cx="400" cy="200" r="160" fill="none" stroke="#fef08a" stroke-width="1" stroke-dasharray="2 12" />
  </g>

  <!-- The Giant Reflected Silhouette (Mind/Soul of Confidence) -->
  <g transform="translate(400, 200)">
    <!-- Giant Glowing Golden Silhouette -->
    <!-- Head -->
    <circle cx="0" cy="-60" r="22" fill="#fef08a" filter="url(#glow)" />
    <!-- Crown of confidence on reflected head -->
    <path d="M -15 -85 L -5 -76 L 0 -92 L 5 -76 L 15 -85 L 8 -65 L -8 -65 Z" fill="#fbbf24" filter="url(#glow)" />
    <!-- Torso and Upraised Arms of Victory/Belief -->
    <path d="M -25 -10 C -40 -30, -50 -50, -45 -70 C -40 -75, -30 -65, -20 -40 L -10 -25 L -10 60 L 10 60 L 10 -25 L 20 -40 C 30 -65, 40 -75, 45 -70 C 50 -50, 40 -30, 25 -10 Z" fill="#fbbf24" filter="url(#glow)" />
    <!-- Inner heart/core energy of reflection -->
    <circle cx="0" cy="-15" r="10" fill="#ffffff" filter="url(#glow)" />
  </g>

  <!-- Cliff/Platform where physical observer stands -->
  <path d="M -10 450 L 300 450 L 360 380 L 440 380 L 500 450 L 810 450 L 810 490 L -10 490 Z" fill="#090501" stroke="#fb923c" stroke-width="2" />
  
  <!-- Glowing floor grid for platform -->
  <g stroke="#fbbf24" stroke-width="1" opacity="0.6">
    <line x1="360" y1="380" x2="440" y2="380" />
    <line x1="300" y1="450" x2="360" y2="380" />
    <line x1="500" y1="450" x2="440" y2="380" />
    <!-- Horizontal grids -->
    <line x1="330" y1="415" x2="470" y2="415" opacity="0.5" />
    <!-- Vertical projections -->
    <line x1="360" y1="380" x2="360" y2="370" />
    <line x1="440" y1="380" x2="440" y2="370" />
  </g>

  <!-- The Physical Observer (Silhouette) standing on edge -->
  <g transform="translate(400, 380)">
    <!-- Shadow projection -->
    <ellipse cx="0" cy="5" rx="15" ry="3" fill="#000000" opacity="0.9" />
    <!-- Body -->
    <path d="M -6 0 L -8 -30 C -8 -35, 8 -35, 8 -30 L 6 0 Z" fill="#160e05" stroke="#fb923c" stroke-width="1" />
    <!-- Head -->
    <circle cx="0" cy="-37" r="5" fill="#160e05" stroke="#fb923c" stroke-width="1" />
    <!-- Golden visor glowing on the silhouette -->
    <path d="M -3 -38 A 3 3 0 0 1 3 -38 Z" fill="#fef08a" />
  </g>

  <!-- Interactive Floating HUD Cards (Self Reflection Data) -->
  <g class="floating-hud" transform="translate(50, 150)" font-family="JetBrains Mono, monospace" fill="#fbbf24" font-size="9" opacity="0.8">
    <!-- Target Box -->
    <rect x="0" y="0" width="160" height="65" fill="#110a03" stroke="#fb923c" stroke-width="1.5" rx="3" opacity="0.8" />
    <text x="10" y="18" font-weight="bold">REFLECTOR ID: J-99</text>
    <text x="10" y="32">EGO RESONANCE: 99.1%</text>
    <text x="10" y="46">INTEGRATED POWER: NOMINAL</text>
    <!-- Little crosshair corner -->
    <path d="M 5 5 L 15 5 L 15 15" fill="none" stroke="#fef08a" stroke-width="1" />
  </g>

  <g class="floating-hud" transform="translate(590, 150)" font-family="JetBrains Mono, monospace" fill="#fbbf24" font-size="9" opacity="0.8">
    <!-- Target Box -->
    <rect x="0" y="0" width="160" height="65" fill="#110a03" stroke="#fb923c" stroke-width="1.5" rx="3" opacity="0.8" />
    <text x="10" y="18" font-weight="bold" fill="#fef08a">TRUE SELF DIAGNOSTIC</text>
    <text x="10" y="32">LIMITERS: BYPASSED</text>
    <text x="10" y="46">COGNITIVE BIAS: DRIVEN</text>
    <!-- Little crosshair corner -->
    <path d="M 155 5 L 145 5 L 145 15" fill="none" stroke="#fef08a" stroke-width="1" />
  </g>

  <!-- Page Title HUD -->
  <g font-family="JetBrains Mono, monospace" fill="#ffffff" opacity="0.9">
    <text x="40" y="45" font-size="12" font-weight="bold" letter-spacing="2">SELF-DISCOVERY PORTAL</text>
    <text x="40" y="60" fill="#fb923c" font-size="8">OBSERVING THE MAJESTY OF INTEGRATED CONFIDENCE</text>
    <line x1="40" y1="70" x2="350" y2="70" stroke="#fb923c" stroke-width="1.5" opacity="0.5" />
  </g>

  <!-- Decorative Outer HUD elements -->
  <path d="M 15 30 L 15 15 L 30 15" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 785 30 L 785 15 L 770 15" fill="none" stroke="#fbbf24" stroke-width="2" />
</svg>
