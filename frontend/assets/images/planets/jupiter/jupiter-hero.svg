<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Space Background Gradient -->
    <radialGradient id="space-bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1c160c" />
      <stop offset="60%" stop-color="#0c0a06" />
      <stop offset="100%" stop-color="#020201" />
    </radialGradient>
    
    <!-- Jupiter Planet Gradient -->
    <linearGradient id="jupiter-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="30%" stop-color="#fbbf24" />
      <stop offset="70%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#7c2d12" />
    </linearGradient>

    <!-- Ring Gradient -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" stop-opacity="0" />
      <stop offset="30%" stop-color="#fbbf24" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#fef08a" stop-opacity="0.9" />
      <stop offset="70%" stop-color="#fbbf24" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="intense-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes float-astronaut {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
    }
    @keyframes beam-glow {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
    @keyframes rotate-ring {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .star { animation: twinkle 3s infinite ease-in-out; }
    .star-delayed { animation: twinkle 4.5s infinite ease-in-out; }
    .astronaut { animation: float-astronaut 6s infinite ease-in-out; transform-origin: 620px 220px; }
    .light-beam { animation: beam-glow 4s infinite ease-in-out; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#space-bg)" />

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="75" cy="80" r="1" class="star" />
    <circle cx="150" cy="40" r="1.5" class="star-delayed" />
    <circle cx="280" cy="120" r="1" class="star" />
    <circle cx="450" cy="60" r="1" class="star-delayed" />
    <circle cx="600" cy="90" r="1.5" class="star" />
    <circle cx="710" cy="50" r="1" class="star-delayed" />
    <circle cx="80" cy="380" r="1.5" class="star" />
    <circle cx="220" cy="400" r="1" class="star-delayed" />
    <circle cx="520" cy="350" r="1" class="star" />
    <circle cx="730" cy="390" r="1.5" class="star-delayed" />
  </g>

  <!-- Giant Columns of Light in Background -->
  <path d="M 280 450 L 330 0 L 390 0 L 440 450 Z" fill="url(#ring-grad)" class="light-beam" opacity="0.3" filter="url(#intense-glow)" />
  <path d="M 120 450 L 170 0 L 210 0 L 260 450 Z" fill="url(#ring-grad)" class="light-beam" opacity="0.2" filter="url(#intense-glow)" />

  <!-- Mountain Peaks (Confidence ground) -->
  <g fill="#160d03" stroke="#fb923c" stroke-width="1.5">
    <polygon points="-50,450 120,280 280,450" />
    <polygon points="180,450 350,230 520,450" />
    <polygon points="400,450 580,260 760,450" />
    <polygon points="620,450 750,310 900,450" />
  </g>
  
  <!-- Glowing horizon path -->
  <path d="M -50 450 L 120 280 L 350 230 L 580 260 L 750 310 L 900 450" fill="none" stroke="#fbbf24" stroke-width="3" filter="url(#glow)" />

  <!-- Jupiter Planet -->
  <g transform="translate(350, 180)">
    <!-- Planet Shadow / Base -->
    <circle r="90" fill="url(#jupiter-grad)" />
    
    <!-- Stripes Details -->
    <path d="M -88 -20 Q 0 -35 88 -20 Q 0 -5 0 -20 Z" fill="#7c2d12" opacity="0.6" />
    <path d="M -85 15 Q 0 -5 85 15 Q 0 30 0 15 Z" fill="#9a3412" opacity="0.6" />
    <path d="M -72 50 Q 0 35 72 50 Q 0 65 0 50 Z" fill="#ea580c" opacity="0.5" />
    <path d="M -60 -60 Q 0 -75 60 -60 Q 0 -45 0 -60 Z" fill="#fef08a" opacity="0.3" />
    
    <!-- Great Red (Orange) Spot -->
    <ellipse cx="40" cy="25" rx="16" ry="10" fill="#ea580c" stroke="#fbbf24" stroke-width="1.5" />
    <ellipse cx="40" cy="25" rx="8" ry="5" fill="#fef08a" opacity="0.8" />
    
    <!-- Ring System -->
    <ellipse cx="0" cy="0" rx="180" ry="30" fill="none" stroke="url(#ring-grad)" stroke-width="8" filter="url(#glow)" transform="rotate(-15)" />
    <ellipse cx="0" cy="0" rx="200" ry="35" fill="none" stroke="url(#ring-grad)" stroke-width="2" opacity="0.5" transform="rotate(-15)" />
  </g>

  <!-- Astronaut floating in the upper right -->
  <g class="astronaut" transform="translate(10, 0)">
    <!-- Tether line of golden energy -->
    <path d="M 350 180 C 450 120, 520 180, 610 215" fill="none" stroke="#fbbf24" stroke-dasharray="4,4" stroke-width="2" class="light-beam" />
    
    <g transform="translate(600, 190)">
      <!-- Suit shadow -->
      <circle cx="20" cy="20" r="18" fill="#120c04" />
      <!-- Backpack -->
      <rect x="2" y="10" width="10" height="24" rx="3" fill="#fb923c" stroke="#fef08a" stroke-width="1.5" />
      <!-- Helmet -->
      <circle cx="24" cy="16" r="10" fill="#fef08a" stroke="#fbbf24" stroke-width="1.5" />
      <!-- Visor (Golden Glow) -->
      <path d="M 22 11 A 7 7 0 0 1 32 18 Z" fill="#fb923c" filter="url(#glow)" />
      <!-- Body / Suit -->
      <path d="M 12 28 C 12 24, 30 24, 30 28 L 28 42 L 24 42 L 24 50 L 18 50 L 18 42 L 14 42 Z" fill="#ffffff" stroke="#fbbf24" stroke-width="1.5" />
      <!-- Arms -->
      <path d="M 12 28 C 6 28, 4 36, 10 38" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
      <path d="M 30 28 C 36 28, 38 34, 34 38" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    </g>
  </g>

  <!-- Sci-Fi HUD Overlay -->
  <!-- Top Left Coordinates -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#fbbf24" opacity="0.8">
    <text x="30" y="40">SECTOR: JUPITER-IV // CONFIDENCE</text>
    <text x="30" y="55">COORD: 05.143.99.88</text>
    <line x1="30" y1="65" x2="180" y2="65" stroke="#fbbf24" stroke-width="1" opacity="0.5" />
  </g>

  <!-- Top Right Status -->
  <g font-family="JetBrains Mono, monospace" font-size="10" fill="#fbbf24" opacity="0.8" text-anchor="end">
    <text x="770" y="40">CORE BEAM: ACTIVE</text>
    <text x="770" y="55">GRAVITY INDEX: 2.52 G</text>
    <line x1="620" y1="65" x2="770" y2="65" stroke="#fbbf24" stroke-width="1" opacity="0.5" />
  </g>

  <!-- Center HUD target overlay -->
  <g transform="translate(350, 180)" stroke="#fb923c" stroke-width="1" fill="none" opacity="0.5">
    <circle r="110" stroke-dasharray="10,20" />
    <circle r="120" stroke-dasharray="5,45" />
    <!-- Crosshairs -->
    <line x1="-135" y1="0" x2="-125" y2="0" />
    <line x1="125" y1="0" x2="135" y2="0" />
    <line x1="0" y1="-135" x2="0" y2="-125" />
    <line x1="0" y1="125" x2="0" y2="135" />
  </g>

  <!-- Bottom Left Legend -->
  <g font-family="JetBrains Mono, monospace" font-size="11" fill="#fef08a" opacity="0.9">
    <text x="30" y="410" font-weight="bold">OBJECTIVE: EXPAND CONSCIOUSNESS</text>
    <text x="30" y="425" fill="#fb923c">EMOTIONAL CORE: RADIAL CONFIDENCE</text>
  </g>

  <!-- Outer frame border brackets -->
  <path d="M 20 40 L 20 20 L 40 20" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 780 40 L 780 20 L 760 20" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 20 410 L 20 430 L 40 430" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 780 410 L 780 430 L 760 430" fill="none" stroke="#fbbf24" stroke-width="2" />
</svg>
