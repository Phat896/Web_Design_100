<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#140f08" />
      <stop offset="60%" stop-color="#070503" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>

    <!-- Glowing effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="membrane-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
  </defs>

  <style>
    @keyframes synapse-discharge {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes chemical-flow {
      0% { transform: translateY(0px) scale(1); opacity: 0.8; }
      100% { transform: translateY(120px) scale(0.8); opacity: 0.2; }
    }
    @keyframes impulse-flash {
      0% { stroke-dashoffset: 100; }
      100% { stroke-dashoffset: 0; }
    }
    .discharge { animation: synapse-discharge 3s infinite ease-in-out; }
    .flow-1 { animation: chemical-flow 4s infinite linear; }
    .flow-2 { animation: chemical-flow 4s infinite linear 1.3s; }
    .flow-3 { animation: chemical-flow 4s infinite linear 2.6s; }
    .impulse { stroke-dasharray: 12 12; animation: impulse-flash 4s infinite linear; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)" />

  <!-- Grid Blueprint lines -->
  <g stroke="#fb923c" stroke-width="0.5" opacity="0.12">
    <!-- Horizontal -->
    <line x1="50" y1="50" x2="750" y2="50" />
    <line x1="50" y1="150" x2="750" y2="150" />
    <line x1="50" y1="250" x2="750" y2="250" />
    <line x1="50" y1="350" x2="750" y2="350" />
    <!-- Vertical -->
    <line x1="150" y1="50" x2="150" y2="400" />
    <line x1="300" y1="50" x2="300" y2="400" />
    <line x1="450" y1="50" x2="450" y2="400" />
    <line x1="600" y1="50" x2="600" y2="400" />
  </g>

  <!-- Title & Blueprint Info -->
  <g font-family="JetBrains Mono, monospace" fill="#fbbf24" opacity="0.8">
    <text x="40" y="45" font-size="12" font-weight="bold">TECHNICAL SCHEMATIC // NEURO-JUNCTION</text>
    <text x="40" y="60" fill="#fef08a" font-size="9">TRANS-SYNAPTIC DOPAMINERGIC DISCHARGE MAP (JUPITER CORE)</text>
    <line x1="40" y1="70" x2="400" y2="70" stroke="#fb923c" stroke-width="1.5" opacity="0.5" />
  </g>

  <!-- PRESYNAPTIC TERMINAL (Top membrane) -->
  <g transform="translate(150, 110)">
    <!-- Boundary line -->
    <path d="M 0 0 C 100 40, 200 40, 300 0" fill="none" stroke="url(#membrane-grad)" stroke-width="3" filter="url(#glow)" />
    <!-- Outer boundary back shadow -->
    <path d="M -20 -15 C 80 25, 220 25, 320 -15" fill="none" stroke="#ea580c" stroke-width="1" opacity="0.5" />

    <!-- Vesicles containing Dopamine (Confidence) -->
    <!-- Vesicle 1 -->
    <g transform="translate(70, -20)">
      <circle r="18" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="3,3" />
      <circle cx="-5" cy="-2" r="3.5" fill="#fef08a" />
      <circle cx="5" cy="4" r="3" fill="#fef08a" />
      <circle cx="2" cy="-6" r="2.5" fill="#fbbf24" />
    </g>
    <!-- Vesicle 2 -->
    <g transform="translate(150, -35)">
      <circle r="20" fill="none" stroke="#fb923c" stroke-width="1.5" />
      <circle cx="-6" cy="2" r="4" fill="#fef08a" />
      <circle cx="6" cy="-4" r="3.5" fill="#fef08a" />
      <circle cx="2" cy="7" r="3" fill="#fbbf24" />
    </g>
    <!-- Vesicle 3 (Merging to release neurotransmitters) -->
    <g transform="translate(220, -10)" class="discharge">
      <path d="M -15 -10 A 16 16 0 1 1 15 -10 L 10 5 C 5 2, -5 2, -10 5 Z" fill="none" stroke="#fbbf24" stroke-width="2" />
      <!-- Releasing molecules -->
      <circle cx="0" cy="12" r="3" fill="#ffffff" filter="url(#glow)" />
      <circle cx="-8" cy="4" r="3.5" fill="#fef08a" />
      <circle cx="8" cy="2" r="3.5" fill="#fef08a" />
    </g>

    <!-- Transporter Reuptake Pump -->
    <g transform="translate(30, -10)" stroke="#fbbf24" stroke-width="1.5" fill="none">
      <path d="M -10 -5 L -5 5 L 5 5 L 10 -5" />
      <circle cx="0" cy="0" r="3" fill="#ea580c" stroke="none" />
    </g>

    <!-- Action Potential impulse wave line -->
    <path d="M 150 -100 L 150 -55" stroke="#fef08a" stroke-width="2.5" class="impulse" filter="url(#glow)" />
    <path d="M 145 -70 L 150 -55 L 155 -70" stroke="#ffffff" stroke-width="2" fill="none" />
  </g>

  <!-- POSTSYNAPTIC MEMBRANE (Bottom membrane) -->
  <g transform="translate(150, 270)">
    <!-- Boundary line -->
    <path d="M 0 50 C 100 10, 200 10, 300 50" fill="none" stroke="url(#membrane-grad)" stroke-width="3" filter="url(#glow)" />
    <path d="M -20 65 C 80 25, 220 25, 320 65" fill="none" stroke="#ea580c" stroke-width="1" opacity="0.5" />

    <!-- Neurotransmitter Receptors receiving gold signals -->
    <!-- Receptor 1 -->
    <g transform="translate(80, 25)" stroke="#fbbf24" stroke-width="2" fill="none">
      <path d="M -12 -5 C -12 10, 12 10, 12 -5" />
      <!-- Received molecule -->
      <circle cx="0" cy="0" r="3.5" fill="#ffffff" filter="url(#glow)" stroke="none" class="discharge" />
      <!-- Signal propagation downwards -->
      <path d="M 0 8 L 0 35" stroke="#fef08a" stroke-dasharray="2,3" />
    </g>
    <!-- Receptor 2 -->
    <g transform="translate(150, 20)" stroke="#fbbf24" stroke-width="2" fill="none">
      <path d="M -12 -5 C -12 10, 12 10, 12 -5" />
      <!-- Molecule docking -->
      <circle cx="0" cy="0" r="3.5" fill="#fef08a" stroke="none" />
      <path d="M 0 8 L 0 35" stroke="#fef08a" stroke-dasharray="2,3" />
    </g>
    <!-- Receptor 3 -->
    <g transform="translate(220, 25)" stroke="#fbbf24" stroke-width="2" fill="none">
      <path d="M -12 -5 C -12 10, 12 10, 12 -5" />
      <path d="M 0 8 L 0 35" stroke="#fb923c" stroke-dasharray="2,3" />
    </g>
  </g>

  <!-- Synaptic Cleft Molecule Flow (Animated floating particles) -->
  <g transform="translate(150, 110)">
    <!-- Flowing Molecules Group 1 -->
    <g class="flow-1">
      <circle cx="100" cy="30" r="3.5" fill="#fef08a" filter="url(#glow)" />
      <circle cx="210" cy="40" r="3" fill="#fb923c" />
    </g>
    <!-- Flowing Molecules Group 2 -->
    <g class="flow-2">
      <circle cx="160" cy="20" r="4.5" fill="#ffffff" filter="url(#glow)" />
      <circle cx="80" cy="45" r="3" fill="#fef08a" />
    </g>
    <!-- Flowing Molecules Group 3 -->
    <g class="flow-3">
      <circle cx="230" cy="30" r="3" fill="#fbbf24" />
      <circle cx="140" cy="50" r="4" fill="#fb923c" />
    </g>
  </g>

  <!-- Technical Annotation Callouts / Pointer Lines -->
  <g font-family="JetBrains Mono, monospace" font-size="9" fill="#fbbf24" stroke="#fb923c" stroke-width="0.75">
    <!-- Presynaptic callout -->
    <polyline points="120,80 180,80 200,95" fill="none" />
    <text x="115" y="76" text-anchor="end" stroke="none" font-weight="bold">PRE-SYNAPTIC TERMINAL</text>
    <text x="115" y="86" text-anchor="end" stroke="none" fill="#a1a1aa" font-size="7">RELEASE SITE FOR DOPAMINE</text>

    <!-- Action Potential callout -->
    <polyline points="420,50 330,50 300,70" fill="none" />
    <text x="425" y="47" stroke="none" font-weight="bold">ACTION POTENTIAL</text>
    <text x="425" y="57" stroke="none" fill="#a1a1aa" font-size="7">VOLTAGE STIMULUS: +40mV</text>

    <!-- Vesicle callout -->
    <polyline points="470,120 400,120 320,80" fill="none" />
    <text x="475" y="117" stroke="none" font-weight="bold">SYNAPTIC VESICLE</text>
    <text x="475" y="127" stroke="none" fill="#a1a1aa" font-size="7">CONCENTRATED TRANSMITTER PACKET</text>

    <!-- Receptors callout -->
    <polyline points="480,300 420,300 390,290" fill="none" />
    <text x="485" y="297" stroke="none" font-weight="bold">D2 RECEPTOR ARRAY</text>
    <text x="485" y="307" stroke="none" fill="#a1a1aa" font-size="7">POST-MEMBRANE GATEWAY</text>

    <!-- Intracellular cascade -->
    <polyline points="200,380 260,380 280,315" fill="none" />
    <text x="195" y="376" text-anchor="end" stroke="none" font-weight="bold">INTRACELLULAR SIGNALING</text>
    <text x="195" y="386" text-anchor="end" stroke="none" fill="#a1a1aa" font-size="7">INDUCING COGNITIVE BALANCE &amp; DRIVE</text>
  </g>

  <!-- Bottom HUD Status Readout -->
  <g font-family="JetBrains Mono, monospace" fill="#fbbf24" opacity="0.8" font-size="10">
    <rect x="40" y="410" width="10" height="10" fill="#fb923c" />
    <text x="60" y="419">STIMULATOR: ACTIVE</text>
    
    <rect x="220" y="410" width="10" height="10" fill="#fef08a" />
    <text x="240" y="419">SYNCHRONICITY: 99.4%</text>

    <text x="760" y="419" text-anchor="end">SYS.REF: BIO-MAP-008 // JUPITER</text>
  </g>

  <!-- Outer brackets -->
  <path d="M 15 30 L 15 15 L 30 15" fill="none" stroke="#fbbf24" stroke-width="2" />
  <path d="M 785 30 L 785 15 L 770 15" fill="none" stroke="#fbbf24" stroke-width="2" />
</svg>
