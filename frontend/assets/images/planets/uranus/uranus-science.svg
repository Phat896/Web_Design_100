<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#061624" />
      <stop offset="70%" stop-color="#02080d" />
      <stop offset="100%" stop-color="#000204" />
    </radialGradient>

    <!-- Glowing Filters -->
    <filter id="glow-light" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;300;400;700&amp;display=swap');
    
    .hud-text {
      font-family: 'JetBrains Mono', monospace;
      fill: #67e8f9;
      font-size: 9px;
      letter-spacing: 1px;
    }
    
    .hud-label {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 11px;
      fill: #ffffff;
      letter-spacing: 2px;
    }

    /* Animations */
    @keyframes pulse-transmitter {
      0%, 100% { opacity: 0.2; transform: translateY(0px) scale(0.8); }
      50% { opacity: 0.9; transform: translateY(5px) scale(1.1); }
    }

    @keyframes pulse-vesicle {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    .transmitter-dot { animation: pulse-transmitter 4s infinite ease-in-out; }
    .vesicle { animation: pulse-vesicle 5s infinite ease-in-out; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-grad)" />

  <!-- Scientific Blueprint Grid -->
  <g stroke="#67e8f9" stroke-width="0.5" stroke-opacity="0.1" fill="none">
    <path d="M 50 0 L 50 450 M 100 0 L 100 450 M 200 0 L 200 450 M 300 0 L 300 450 M 400 0 L 400 450 M 500 0 L 500 450 M 600 0 L 600 450 M 700 0 L 700 450 M 750 0 L 750 450" />
    <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 200 L 800 200 M 0 300 L 800 300 M 0 400 L 800 400" />
  </g>

  <!-- Title / Headers -->
  <g transform="translate(50, 45)">
    <text x="0" y="0" class="hud-label" style="font-size: 14px; fill: #67e8f9;">NEUROBIOLOGY DIAGRAM // SEC_84</text>
    <text x="0" y="15" class="hud-text" style="fill: #ffffff; opacity: 0.5;">TOPIC: SYNAPTIC TRANSMISSION UNDER PROLONGED ISOLATION</text>
  </g>

  <!-- Diagram: Synaptic Cleft (Biology) -->
  <!-- Left Side: Pre-Synaptic Neuron Terminal -->
  <g stroke="#67e8f9" stroke-width="1.5" fill="none">
    <!-- Outer membrane -->
    <path d="M 120,100 C 150,100 200,120 220,180 C 225,200 220,240 220,280 C 200,340 150,360 120,360" stroke-opacity="0.6" />
    <!-- Inner structural line -->
    <path d="M 110,115 C 135,115 180,135 195,190 C 200,210 195,240 195,270 C 180,320 135,340 110,340" stroke-opacity="0.3" stroke-dasharray="2,4" />

    <!-- Vesicles inside pre-synaptic terminal -->
    <g class="vesicle" fill="#0c2538" stroke="#67e8f9" stroke-width="1" opacity="0.6">
      <circle cx="150" cy="150" r="14" />
      <circle cx="170" cy="220" r="16" />
      <circle cx="140" cy="290" r="15" />
      
      <!-- Neurotransmitters stored in vesicles -->
      <circle cx="150" cy="150" r="2" fill="#ffffff" />
      <circle cx="146" cy="146" r="1.5" fill="#ffffff" />
      <circle cx="154" cy="152" r="1.5" fill="#ffffff" />

      <circle cx="170" cy="220" r="2" fill="#ffffff" />
      <circle cx="165" cy="215" r="1.5" fill="#ffffff" />
      <circle cx="173" cy="223" r="1.5" fill="#ffffff" />
      
      <circle cx="140" cy="290" r="2" fill="#ffffff" />
    </g>
  </g>

  <!-- Right Side: Post-Synaptic Neuron Membrane -->
  <g stroke="#67e8f9" stroke-width="1.5" fill="none">
    <path d="M 380,100 C 350,100 300,120 280,180 C 275,200 280,240 280,280 C 300,340 350,360 380,360" stroke-opacity="0.6" />
    
    <!-- Receptors on Post-Synaptic Membrane -->
    <!-- Receptor 1 -->
    <path d="M 285,160 Q 295,163 290,172 L 280,178" stroke="#67e8f9" stroke-dasharray="0" />
    <circle cx="290" cy="166" r="3" fill="#061624" stroke="#67e8f9" />
    <!-- Receptor 2 (empty/inactive) -->
    <path d="M 278,210 Q 288,213 283,222 L 273,228" />
    <circle cx="283" cy="216" r="3" fill="#061624" stroke="#67e8f9" />
    <!-- Receptor 3 -->
    <path d="M 278,250 Q 288,253 283,262 L 273,268" />
    <circle cx="283" cy="256" r="3" fill="#061624" stroke="#67e8f9" />
    <!-- Receptor 4 -->
    <path d="M 285,300 Q 295,303 290,312 L 280,318" />
    <circle cx="290" cy="306" r="3" fill="#061624" stroke="#67e8f9" />
  </g>

  <!-- Neurotransmitter Molecules (Oxytocin / Dopamine) in the Cleft -->
  <!-- Sparse count representing isolation decay -->
  <g fill="#ffffff" class="transmitter-dot">
    <circle cx="240" cy="180" r="3" filter="url(#glow-light)" />
    <circle cx="235" cy="235" r="3" filter="url(#glow-light)" />
    <circle cx="255" cy="260" r="3" filter="url(#glow-light)" />
    <!-- Extremely sparse / drifting away -->
    <circle cx="225" cy="310" r="2" opacity="0.6" />
    <circle cx="270" cy="140" r="2.5" opacity="0.8" />
  </g>

  <!-- Scientific Annotations / Connecting Callout Lines -->
  <g stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.6" fill="none">
    <!-- Callout 1 -->
    <path d="M 170 220 L 210 160 L 260 160" />
    <circle cx="170" cy="220" r="1.5" fill="#ffffff" />
    <text x="265" y="163" class="hud-text" style="fill: #ffffff;">VESICLE (ACTIVE)</text>

    <!-- Callout 2 -->
    <path d="M 240 180 L 270 200 L 310 200" />
    <circle cx="240" cy="180" r="1.5" fill="#ffffff" />
    <text x="315" y="203" class="hud-text" style="fill: #ffffff;">NEUROTRANSMITTER (SPARSE)</text>

    <!-- Callout 3 -->
    <path d="M 283 256 L 310 280 L 340 280" />
    <circle cx="283" cy="256" r="1.5" fill="#ffffff" />
    <text x="345" y="283" class="hud-text" style="fill: #ffffff;">INACTIVE RECEPTOR</text>
  </g>

  <!-- Right Panel: Scientific Graphs (Decay curves) -->
  <g transform="translate(480, 100)">
    <!-- Boundary box -->
    <rect x="0" y="0" width="270" height="260" fill="#040e17" stroke="#67e8f9" stroke-width="0.75" stroke-opacity="0.3" />
    
    <text x="15" y="25" class="hud-label">DYNAMICS SCANNER</text>
    <rect x="15" y="32" width="240" height="1" fill="#67e8f9" opacity="0.2" />

    <!-- Chart 1: Social Stimulation Decaying Curve -->
    <text x="15" y="55" class="hud-text">STIMULATION DECAY RATE</text>
    <g stroke="#67e8f9" stroke-width="1" fill="none">
      <path d="M 20 120 L 250 120" stroke-opacity="0.3" /> <!-- X-axis -->
      <path d="M 20 70 L 20 120" stroke-opacity="0.3" />  <!-- Y-axis -->
      <!-- Curve -->
      <path d="M 20 75 Q 80 115 250 118" stroke="#ffffff" stroke-width="1.5" filter="url(#glow-light)" />
      <path d="M 20 75 Q 80 115 250 118" stroke-dasharray="2,4" />
    </g>
    <text x="210" y="112" class="hud-text" style="font-size: 7px; fill: #ffffff; opacity: 0.5;">T_PROLONGED</text>

    <!-- Chart 2: Receptor Sensitivity -->
    <text x="15" y="155" class="hud-text">RECEPTOR AFFINITY INDEX</text>
    <g stroke="#67e8f9" stroke-width="1" fill="none">
      <path d="M 20 220 L 250 220" stroke-opacity="0.3" />
      <path d="M 20 170 L 20 220" stroke-opacity="0.3" />
      <!-- Bar Graphs -->
      <rect x="35" y="180" width="20" height="40" fill="#67e8f9" fill-opacity="0.8" />
      <rect x="85" y="195" width="20" height="25" fill="#67e8f9" fill-opacity="0.5" />
      <rect x="135" y="208" width="20" height="12" fill="#67e8f9" fill-opacity="0.3" />
      <rect x="185" y="215" width="20" height="5" fill="#ffffff" filter="url(#glow-light)" />
    </g>
    <text x="35" y="235" class="hud-text" style="font-size: 7px; opacity: 0.5;">C1</text>
    <text x="85" y="235" class="hud-text" style="font-size: 7px; opacity: 0.5;">C2</text>
    <text x="135" y="235" class="hud-text" style="font-size: 7px; opacity: 0.5;">C3</text>
    <text x="185" y="235" class="hud-text" style="font-size: 7px; opacity: 0.5;">URANUS</text>
  </g>

  <!-- Technical borders/hud frame -->
  <g stroke="#67e8f9" stroke-width="1" opacity="0.3" fill="none">
    <path d="M 20 20 L 20 430 L 780 430 L 780 20 Z" />
    <path d="M 10 10 L 30 10 M 10 10 L 10 30" />
    <path d="M 790 10 L 770 10 M 790 10 L 790 30" />
  </g>
</svg>
