<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08050e" />
      <stop offset="50%" stop-color="#0f091f" />
      <stop offset="100%" stop-color="#030107" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#6b21a8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="scannerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0" />
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0" />
    </linearGradient>
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes scan {
      0% { transform: translateY(-100px); opacity: 0.1; }
      50% { opacity: 0.8; }
      100% { transform: translateY(350px); opacity: 0.1; }
    }
    @keyframes pulseData {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes spinCore {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .scanner-line { animation: scan 6s linear infinite; }
    .data-pulse { animation: pulseData 3s infinite ease-in-out; }
    .core-spin { animation: spinCore 40s linear infinite; transform-origin: 320px 225px; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Scientific Blueprint Grid -->
  <g stroke="#8a9ca8" stroke-width="0.5" opacity="0.12">
    <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400" />
    <path d="M 100 0 L 100 450 M 200 0 L 200 450 M 300 0 L 300 450 M 400 0 L 400 450 M 500 0 L 500 450 M 600 0 L 600 450 M 700 0 L 700 450" />
  </g>

  <!-- Title / Headers -->
  <g transform="translate(40, 50)">
    <text x="0" y="0" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="bold" letter-spacing="1">PLANETARY SCHEMATIC: SATURN_06</text>
    <text x="0" y="16" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="10">ATMOSPHERIC PROFILE &amp; GRAVITATIONAL PRESSURE ANALYSIS</text>
  </g>

  <!-- Cross-section Planet Diagram (Left Center) -->
  <g transform="translate(0, 0)">
    <!-- Core Glow -->
    <circle cx="320" cy="225" r="130" fill="url(#coreGlow)" />
    
    <!-- Outer Atmosphere boundary -->
    <circle cx="320" cy="225" r="110" fill="none" stroke="#8a9ca8" stroke-width="1.5" stroke-dasharray="4 4" />
    <text x="320" y="105" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">OUTER ATMOSPHERE (H₂ + He)</text>

    <!-- Liquid/Metallic Hydrogen Layer -->
    <circle cx="320" cy="225" r="80" fill="none" stroke="#c084fc" stroke-width="2" />
    <text x="320" y="135" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">LIQUID METALLIC HYDROGEN</text>

    <!-- Rocky/Ice Core -->
    <circle cx="320" cy="225" r="40" fill="#2e1065" stroke="#ffffff" stroke-width="2" class="core-spin" />
    <circle cx="320" cy="225" r="8" fill="#ffffff" filter="url(#glow)" />
    <text x="320" y="228" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle" font-weight="bold">HEAVY CORE</text>

    <!-- Ring Indicators & Labels -->
    <!-- Rings structure -->
    <path d="M 120 225 L 520 225" stroke="#8a9ca8" stroke-width="2" opacity="0.5" />
    <!-- Cassini Division indicators -->
    <line x1="190" y1="215" x2="190" y2="235" stroke="#c084fc" stroke-width="1.5" />
    <text x="190" y="248" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">CASSINI DIV.</text>

    <line x1="450" y1="215" x2="450" y2="235" stroke="#c084fc" stroke-width="1.5" />
    <text x="450" y="248" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">A-RING LIMIT</text>

    <line x1="140" y1="220" x2="140" y2="230" stroke="#8a9ca8" stroke-width="1" />
    <text x="140" y="212" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">C-RING</text>

    <line x1="240" y1="220" x2="240" y2="230" stroke="#8a9ca8" stroke-width="1" />
    <text x="240" y="212" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="8" text-anchor="middle">B-RING</text>

    <!-- Cross section cut marks -->
    <path d="M 320 225 L 415 170" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 2" />
    <path d="M 320 225 L 415 280" stroke="#ffffff" stroke-width="1" stroke-dasharray="2 2" />
    <path d="M 415 170 A 110 110 0 0 1 415 280" fill="none" stroke="#ffffff" stroke-width="1.5" />
  </g>

  <!-- Right Side: Data charts (Pressure Curve) -->
  <g transform="translate(520, 100)">
    <rect x="0" y="0" width="240" height="230" fill="#0b0813" stroke="#8a9ca8" stroke-width="1" rx="4" />
    
    <!-- Pressure Graph -->
    <text x="15" y="20" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="9" font-weight="bold">PRESSURE (GPa) VS DEPTH (10³ km)</text>
    
    <!-- Y-axis -->
    <line x1="30" y1="40" x2="30" y2="180" stroke="#8a9ca8" stroke-width="1" />
    <text x="25" y="45" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="7" text-anchor="end">1000</text>
    <text x="25" y="110" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="7" text-anchor="end">500</text>
    <text x="25" y="180" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="7" text-anchor="end">0</text>

    <!-- X-axis -->
    <line x1="30" y1="180" x2="220" y2="180" stroke="#8a9ca8" stroke-width="1" />
    <text x="30" y="192" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="7" text-anchor="middle">0</text>
    <text x="120" y="192" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="7" text-anchor="middle">30k</text>
    <text x="210" y="192" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="7" text-anchor="middle">60k</text>

    <!-- Graph Line (Exponential curve showing pressure spikes near core) -->
    <path d="M 30 180 Q 140 170, 190 120 T 215 50" fill="none" stroke="#c084fc" stroke-width="2" filter="url(#glow)" />
    <!-- Data points -->
    <circle cx="190" cy="120" r="3" fill="#ffffff" />
    <text x="180" y="112" fill="#ffffff" font-family="'JetBrains Mono', monospace" font-size="7">METALLIC_PHASE</text>
    <circle cx="215" cy="50" r="3" fill="#ef4444" />
    <text x="210" y="42" fill="#ef4444" font-family="'JetBrains Mono', monospace" font-size="7" text-anchor="end">CORE LIMIT</text>

    <!-- Core statistics readouts -->
    <text x="15" y="215" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="8">MAX PRESSURE: ~1,000 GPa</text>
    <text x="130" y="215" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="8">CORE_TEMP: 11,700 K</text>
  </g>

  <!-- Laser scanner bar moving down the blueprint -->
  <rect x="50" y="80" width="700" height="20" fill="url(#scannerGrad)" class="scanner-line" />

  <!-- Technical Telemetry Data -->
  <g transform="translate(40, 360)" class="data-pulse">
    <text x="0" y="0" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="9">ROTATION PERIOD: 10H 33M 38S // FLATTENING RATIO: 0.09796 (OBLATE SPHEROID)</text>
    <text x="0" y="12" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="9">RING THICKNESS: 10M - 1KM // INTEGRITY STRESS: STABLE LIMIT</text>
  </g>

  <!-- HUD text in corners -->
  <g transform="translate(40, 410)">
    <text x="0" y="0" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1">DIAGNOSTIC GRAPH // DEEP_GRAVITY_PROBE_SATURN // OK</text>
  </g>
  <g transform="translate(760, 410)">
    <text x="0" y="0" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="end">SYS_LOC: ASTRO_CHEM_LAB</text>
  </g>
</svg>
