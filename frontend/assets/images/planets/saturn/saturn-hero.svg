<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0813" />
      <stop offset="50%" stop-color="#160f29" />
      <stop offset="100%" stop-color="#040208" />
    </linearGradient>
    <radialGradient id="saturnGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b4fe" />
      <stop offset="60%" stop-color="#6b21a8" />
      <stop offset="100%" stop-color="#2e1065" />
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a9ca8" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#c084fc" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#475569" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8a9ca8" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="hudGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#8a9ca8" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="heavyGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <style>
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(1deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes rotateRing {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .star { animation: twinkle 3s infinite ease-in-out; }
    .star-fast { animation: twinkle 1.5s infinite ease-in-out; }
    .saturn-group { animation: float 8s infinite ease-in-out; transform-origin: 400px 225px; }
    .hud-element { animation: pulse 4s infinite ease-in-out; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="80" cy="90" r="1" class="star" style="animation-delay: 0s;" />
    <circle cx="150" cy="50" r="1.5" class="star" style="animation-delay: 0.5s;" />
    <circle cx="280" cy="80" r="1" class="star" style="animation-delay: 1.2s;" />
    <circle cx="340" cy="120" r="2" class="star-fast" style="animation-delay: 0.3s;" />
    <circle cx="680" cy="70" r="1" class="star" style="animation-delay: 1.8s;" />
    <circle cx="720" cy="150" r="1.5" class="star" style="animation-delay: 0.9s;" />
    <circle cx="120" cy="320" r="1" class="star" style="animation-delay: 2.2s;" />
    <circle cx="230" cy="380" r="1.5" class="star-fast" style="animation-delay: 0.7s;" />
    <circle cx="590" cy="310" r="1" class="star" style="animation-delay: 1.4s;" />
    <circle cx="700" cy="340" r="2" class="star" style="animation-delay: 0.2s;" />
  </g>

  <!-- Cosmic Nebula/Glow -->
  <circle cx="400" cy="225" r="280" fill="#6b21a8" opacity="0.15" filter="url(#heavyGlow)" />
  <circle cx="400" cy="225" r="180" fill="#8a9ca8" opacity="0.1" filter="url(#heavyGlow)" />

  <!-- Saturn & Rings Group -->
  <g class="saturn-group">
    <!-- Back Ring (Saturn's rings behind the planet body) -->
    <path d="M 160 225 A 260 70 25 0 1 640 225" fill="none" stroke="url(#ringGrad)" stroke-width="28" opacity="0.85" filter="url(#glow)"/>
    <path d="M 200 225 A 210 50 25 0 1 600 225" fill="none" stroke="#8a9ca8" stroke-width="4" opacity="0.5" stroke-dasharray="8 8"/>
    
    <!-- Planet Shadow Backing -->
    <circle cx="400" cy="225" r="100" fill="#1e1b4b" />
    
    <!-- Saturn Planet Body -->
    <circle cx="400" cy="225" r="100" fill="url(#saturnGrad)" filter="url(#glow)" />
    
    <!-- Atmospheric Bands -->
    <path d="M 302 200 C 340 215, 460 215, 498 200 A 100 100 0 0 1 302 200 Z" fill="#4c1d95" opacity="0.4" />
    <path d="M 305 240 C 345 255, 455 255, 495 240 A 100 100 0 0 0 305 240 Z" fill="#8a9ca8" opacity="0.25" />

    <!-- Front Ring (Saturn's rings in front of the planet body) -->
    <path d="M 640 225 A 260 70 25 0 1 160 225" fill="none" stroke="url(#ringGrad)" stroke-width="28" opacity="0.85" filter="url(#glow)"/>
    <path d="M 600 225 A 210 50 25 0 1 200 225" fill="none" stroke="#c084fc" stroke-width="3" opacity="0.6" />
    
    <!-- Concentric fine ring details -->
    <ellipse cx="400" cy="225" rx="285" ry="78" transform="rotate(25, 400, 225)" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.4" />
    <ellipse cx="400" cy="225" rx="230" ry="62" transform="rotate(25, 400, 225)" fill="none" stroke="#8a9ca8" stroke-width="1" opacity="0.5" />
  </g>

  <!-- Astronaut Silhouette floating under pressure -->
  <g class="saturn-group" style="animation-delay: -2s;">
    <!-- Astronaut body -->
    <g transform="translate(260, 290) scale(0.6) rotate(-15)">
      <!-- Tether -->
      <path d="M -80 -20 Q -20 -10, 0 10" fill="none" stroke="#8a9ca8" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6" />
      <!-- Helmet glow -->
      <circle cx="20" cy="15" r="14" fill="#c084fc" opacity="0.4" filter="url(#glow)" />
      <!-- Suit -->
      <rect x="8" y="25" width="24" height="30" rx="8" fill="#e2e8f0" />
      <!-- Visor -->
      <path d="M 12 12 Q 20 8, 28 12 Q 30 20, 20 22 Q 10 20, 12 12 Z" fill="#0f172a" stroke="#8a9ca8" stroke-width="1" />
      <path d="M 15 13 Q 20 10, 25 13" fill="none" stroke="#c084fc" stroke-width="1.5" />
      <!-- Limbs -->
      <rect x="2" y="28" width="6" height="20" rx="3" fill="#cbd5e1" transform="rotate(20 5 28)" />
      <rect x="32" y="28" width="6" height="20" rx="3" fill="#cbd5e1" transform="rotate(-30 35 28)" />
      <rect x="10" y="52" width="7" height="25" rx="3" fill="#cbd5e1" transform="rotate(10 13 52)" />
      <rect x="23" y="52" width="7" height="25" rx="3" fill="#cbd5e1" transform="rotate(-15 26 52)" />
      <!-- Life pack -->
      <rect x="2" y="28" width="6" height="20" rx="2" fill="#64748b" />
    </g>
  </g>

  <!-- Sci-Fi HUD overlays -->
  <!-- Target Reticle -->
  <g class="hud-element" transform="translate(400, 225)">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#c084fc" stroke-width="1" stroke-dasharray="5 25" opacity="0.4" />
    <circle cx="0" cy="0" r="163" fill="none" stroke="#8a9ca8" stroke-width="0.5" opacity="0.2" />
    <!-- Corner marks -->
    <path d="M -170 -50 L -170 -170 L -50 -170" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.7" />
    <path d="M 170 -50 L 170 -170 L 50 -170" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.7" />
    <path d="M -170 50 L -170 170 L -50 170" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.7" />
    <path d="M 170 50 L 170 170 L 50 170" fill="none" stroke="#c084fc" stroke-width="1.5" opacity="0.7" />
  </g>

  <!-- Grid overlay in background -->
  <g opacity="0.05">
    <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400" stroke="#8a9ca8" stroke-width="1" />
    <path d="M 100 0 L 100 450 M 200 0 L 200 450 M 300 0 L 300 450 M 400 0 L 400 450 M 500 0 L 500 450 M 600 0 L 600 450 M 700 0 L 700 450" stroke="#8a9ca8" stroke-width="1" />
  </g>

  <!-- Left Sidebar HUD data -->
  <g transform="translate(30, 40)" class="hud-element">
    <rect x="0" y="0" width="180" height="90" fill="#0b0813" opacity="0.7" rx="5" stroke="#8a9ca8" stroke-width="1"/>
    <line x1="10" y1="25" x2="170" y2="25" stroke="#c084fc" stroke-width="1.5" />
    <text x="10" y="18" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1">OBJECT: SATURN_06</text>
    <text x="10" y="40" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="9">MASS: 5.683E26 KG</text>
    <text x="10" y="55" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="9">GRAVITY: 10.44 M/S²</text>
    <text x="10" y="70" fill="#cbd5e1" font-family="'JetBrains Mono', monospace" font-size="9">PRESSURE: CRITICAL</text>
    <rect x="130" y="61" width="35" height="10" fill="#c084fc" opacity="0.3" />
    <text x="133" y="69" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="8">HIGH</text>
  </g>

  <!-- Right Sidebar HUD data -->
  <g transform="translate(590, 40)" class="hud-element">
    <rect x="0" y="0" width="180" height="90" fill="#0b0813" opacity="0.7" rx="5" stroke="#8a9ca8" stroke-width="1"/>
    <line x1="10" y1="25" x2="170" y2="25" stroke="#8a9ca8" stroke-width="1.5" />
    <text x="10" y="18" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1">ATMOSPHERE STATUS</text>
    <text x="10" y="40" fill="#cbd5e1" font-family="'JetBrains Mono', monospace" font-size="9">H2: 96.3%  | HE: 3.2%</text>
    <text x="10" y="55" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="9">CORE: METALLIC H</text>
    <text x="10" y="70" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="9">SYS_TEMP: -178 C</text>
  </g>

  <!-- Bottom HUD Info Bar -->
  <g transform="translate(30, 400)">
    <line x1="0" y1="0" x2="740" y2="0" stroke="url(#hudGrad)" stroke-width="1.5" opacity="0.8" />
    <circle cx="0" cy="0" r="3" fill="#c084fc" />
    <circle cx="740" cy="0" r="3" fill="#8a9ca8" />
    <text x="10" y="18" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="2">SYSTEM: ANTIGRAVITY // DEEP_SPACE_PRESSURE // ACTIVE</text>
    <text x="610" y="18" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="1">COORD: 95.42.01</text>
  </g>
</svg>
