<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0512" />
      <stop offset="50%" stop-color="#140b28" />
      <stop offset="100%" stop-color="#030107" />
    </linearGradient>
    <radialGradient id="portalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d8b4fe" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#6b21a8" stop-opacity="0.6" />
      <stop offset="85%" stop-color="#3b0764" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0" />
      <stop offset="50%" stop-color="#c084fc" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes portalPulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.04); opacity: 1; }
    }
    @keyframes floatSilhouette {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes starPulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }
    .portal { animation: portalPulse 6s infinite ease-in-out; transform-origin: 400px 200px; }
    .silhouette { animation: floatSilhouette 5s infinite ease-in-out; transform-origin: 400px 270px; }
    .particle { animation: starPulse 3s infinite ease-in-out; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Background Grid of Pressure -->
  <g stroke="#8a9ca8" stroke-width="0.5" opacity="0.1">
    <path d="M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250 M 0 300 L 800 300 M 0 350 L 800 350 M 0 400 L 800 400" />
    <path d="M 100 0 L 100 450 M 200 0 L 200 450 M 300 0 L 300 450 M 400 0 L 400 450 M 500 0 L 500 450 M 600 0 L 600 450 M 700 0 L 700 450" />
  </g>

  <!-- External Weight blocks pressing on the scene boundaries -->
  <rect x="50" y="30" width="100" height="40" fill="#1e1b4b" stroke="#8a9ca8" stroke-width="1.5" opacity="0.3" />
  <text x="100" y="55" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">LOAD_01</text>
  <rect x="650" y="30" width="100" height="40" fill="#1e1b4b" stroke="#8a9ca8" stroke-width="1.5" opacity="0.3" />
  <text x="700" y="55" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="middle">LOAD_02</text>

  <!-- Floating particles/stress sparks -->
  <g fill="#c084fc">
    <circle cx="120" cy="180" r="2" class="particle" style="animation-delay: 0s;" />
    <circle cx="210" cy="90" r="1.5" class="particle" style="animation-delay: 0.5s;" />
    <circle cx="680" cy="190" r="2" class="particle" style="animation-delay: 1.2s;" />
    <circle cx="580" cy="80" r="2.5" class="particle" style="animation-delay: 0.8s;" />
  </g>

  <!-- Portal/Gateway of Self-Reflection -->
  <g class="portal">
    <!-- Outer Portal Glow -->
    <ellipse cx="400" cy="200" rx="190" ry="140" fill="url(#portalGlow)" filter="url(#glow)" />
    <!-- Portal Frame -->
    <ellipse cx="400" cy="200" rx="140" ry="100" fill="none" stroke="#c084fc" stroke-width="2.5" filter="url(#glow)" />
    <ellipse cx="400" cy="200" rx="146" ry="106" fill="none" stroke="#8a9ca8" stroke-width="1" stroke-dasharray="8 8" opacity="0.6" />

    <!-- Inside the Portal: The True Self (Balanced Saturn planet) -->
    <g transform="translate(0, 0)">
      <!-- Mini Saturn with rings inside portal -->
      <circle cx="400" cy="200" r="35" fill="#581c87" stroke="#c084fc" stroke-width="1.5" />
      <path d="M 320 200 A 90 24 15 0 0 480 200" fill="none" stroke="#ffffff" stroke-width="4" filter="url(#glow)" />
      <path d="M 480 200 A 90 24 15 0 0 320 200" fill="none" stroke="#8a9ca8" stroke-width="2" opacity="0.6" />
      <!-- Star sparks inside -->
      <circle cx="380" cy="180" r="1" fill="#ffffff" />
      <circle cx="420" cy="210" r="1.5" fill="#ffffff" />
      <circle cx="390" cy="220" r="1" fill="#ffffff" />
    </g>
  </g>

  <!-- Light beam shining down from portal onto the silhouette -->
  <polygon points="320,270 480,270 550,450 250,450" fill="url(#beamGrad)" opacity="0.4" />

  <!-- Silhouette standing before Portal -->
  <g class="silhouette">
    <!-- Aura glow -->
    <ellipse cx="400" cy="285" rx="12" ry="25" fill="#c084fc" opacity="0.3" filter="url(#glow)" />
    <!-- Human Body Outline -->
    <!-- Head -->
    <circle cx="400" cy="265" r="7" fill="#0b0813" stroke="#8a9ca8" stroke-width="1.5" />
    <!-- Torso -->
    <path d="M 392 273 L 408 273 L 405 310 L 395 310 Z" fill="#0b0813" stroke="#8a9ca8" stroke-width="1.5" />
    <!-- Arms -->
    <path d="M 392 275 Q 380 290, 385 305" fill="none" stroke="#8a9ca8" stroke-width="1.5" />
    <path d="M 408 275 Q 420 290, 415 305" fill="none" stroke="#8a9ca8" stroke-width="1.5" />
    <!-- Legs -->
    <line x1="395" y1="310" x2="393" y2="345" stroke="#8a9ca8" stroke-width="1.5" />
    <line x1="405" y1="310" x2="407" y2="345" stroke="#8a9ca8" stroke-width="1.5" />
  </g>

  <!-- Platform on which silhouette stands -->
  <line x1="320" y1="345" x2="480" y2="345" stroke="#8a9ca8" stroke-width="2" />
  <polygon points="320,345 480,345 510,360 290,360" fill="#140b28" stroke="#c084fc" stroke-width="1" />
  
  <!-- Under-platform depth line -->
  <line x1="290" y1="360" x2="510" y2="360" stroke="#8a9ca8" stroke-width="1" opacity="0.5" />

  <!-- HUD text details -->
  <g transform="translate(40, 410)">
    <text x="0" y="0" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="10" letter-spacing="1">SELF-REFLECTIVE ALIGNMENT // SYS_LOG: PRESSURE_METAMORPHOSIS</text>
  </g>
  <g transform="translate(760, 410)">
    <text x="0" y="0" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="10" text-anchor="end">SYS_STAT: INTEGRATED</text>
  </g>

  <!-- Left measurement scale -->
  <g transform="translate(40, 150)" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="120" stroke="#8a9ca8" stroke-width="1" />
    <line x1="0" y1="0" x2="8" y2="0" stroke="#8a9ca8" stroke-width="1" />
    <line x1="0" y1="30" x2="5" y2="30" stroke="#8a9ca8" stroke-width="1" />
    <line x1="0" y1="60" x2="8" y2="60" stroke="#c084fc" stroke-width="1.5" />
    <line x1="0" y1="90" x2="5" y2="90" stroke="#8a9ca8" stroke-width="1" />
    <line x1="0" y1="120" x2="8" y2="120" stroke="#8a9ca8" stroke-width="1" />
    <text x="12" y="63" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="8">EGO_BAL</text>
  </g>
</svg>
