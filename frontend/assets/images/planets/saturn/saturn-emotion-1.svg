<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0714" />
      <stop offset="50%" stop-color="#140c26" />
      <stop offset="100%" stop-color="#05030a" />
    </linearGradient>
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="40%" stop-color="#c084fc" />
      <stop offset="80%" stop-color="#6b21a8" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>
    <linearGradient id="purpleGoldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#8a9ca8" />
    </linearGradient>
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes spinClockwise {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spinCounterClockwise {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes compress {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(12px); }
    }
    @keyframes decompress {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    @keyframes corePulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    @keyframes dashOffset {
      to { stroke-dashoffset: -40; }
    }
    .gear-1 { animation: spinClockwise 12s linear infinite; transform-origin: 400px 225px; }
    .gear-2 { animation: spinCounterClockwise 18s linear infinite; transform-origin: 260px 150px; }
    .gear-3 { animation: spinCounterClockwise 15s linear infinite; transform-origin: 540px 300px; }
    .plate-top { animation: compress 5s infinite ease-in-out; }
    .plate-bottom { animation: decompress 5s infinite ease-in-out; }
    .core { animation: corePulse 3s infinite ease-in-out; transform-origin: 400px 225px; }
    .flow-line { stroke-dasharray: 8 12; animation: dashOffset 4s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" />

  <!-- Background Grids and Gravity Fields -->
  <g stroke="#c084fc" stroke-width="0.5" opacity="0.15">
    <!-- Horizontal lines contracting towards center -->
    <line x1="0" y1="225" x2="800" y2="225" />
    <path d="M 0 100 Q 400 180, 800 100" fill="none" />
    <path d="M 0 150 Q 400 210, 800 150" fill="none" />
    <path d="M 0 300 Q 400 240, 800 300" fill="none" />
    <path d="M 0 350 Q 400 270, 800 350" fill="none" />
  </g>

  <!-- Magnetic/Gravity field ripples -->
  <g fill="none" stroke="#8a9ca8" stroke-width="1" opacity="0.3">
    <ellipse cx="400" cy="225" rx="300" ry="180" stroke-dasharray="5 10" />
    <ellipse cx="400" cy="225" rx="240" ry="144" stroke-dasharray="5 10" />
    <ellipse cx="400" cy="225" rx="180" ry="108" class="flow-line" />
  </g>

  <!-- Giant gears showing mechanism of pressure -->
  <!-- Gear 2 (Top Left) -->
  <g class="gear-2">
    <circle cx="260" cy="150" r="50" fill="none" stroke="#8a9ca8" stroke-width="8" opacity="0.25" />
    <circle cx="260" cy="150" r="62" fill="none" stroke="#8a9ca8" stroke-width="4" stroke-dasharray="12 10" opacity="0.25" />
    <line x1="260" y1="90" x2="260" y2="210" stroke="#8a9ca8" stroke-width="3" opacity="0.2" />
    <line x1="200" y1="150" x2="320" y2="150" stroke="#8a9ca8" stroke-width="3" opacity="0.2" />
  </g>

  <!-- Gear 3 (Bottom Right) -->
  <g class="gear-3">
    <circle cx="540" cy="300" r="60" fill="none" stroke="#c084fc" stroke-width="8" opacity="0.2" />
    <circle cx="540" cy="300" r="75" fill="none" stroke="#c084fc" stroke-width="6" stroke-dasharray="15 12" opacity="0.2" />
    <line x1="540" y1="230" x2="540" y2="370" stroke="#c084fc" stroke-width="2" opacity="0.15" />
    <line x1="470" y1="300" x2="610" y2="300" stroke="#c084fc" stroke-width="2" opacity="0.15" />
  </g>

  <!-- Center Gear (Atmospheric/Ring Gear) -->
  <g class="gear-1">
    <!-- Outer Gear teeth -->
    <circle cx="400" cy="225" r="145" fill="none" stroke="#c084fc" stroke-width="12" stroke-dasharray="16 16" opacity="0.3" filter="url(#glow)"/>
    <circle cx="400" cy="225" r="130" fill="none" stroke="#8a9ca8" stroke-width="2" opacity="0.4" />
    <!-- Clock marks -->
    <path d="M 400 90 L 400 100 M 400 350 L 400 360 M 265 225 L 275 225 M 525 225 L 535 225" stroke="#8a9ca8" stroke-width="3" opacity="0.5" />
  </g>

  <!-- Glowing Emotional Core under stress -->
  <circle cx="400" cy="225" r="70" fill="url(#coreGrad)" class="core" filter="url(#glow)" />
  <circle cx="400" cy="225" r="30" fill="#ffffff" class="core" opacity="0.8" filter="url(#glow)" />

  <!-- Massive Weight Blocks / Piston plates compressing the core -->
  <!-- Top Plate -->
  <g class="plate-top">
    <!-- Pistons -->
    <line x1="400" y1="20" x2="400" y2="125" stroke="#8a9ca8" stroke-width="12" opacity="0.8" />
    <line x1="370" y1="50" x2="370" y2="125" stroke="#475569" stroke-width="4" opacity="0.5" />
    <line x1="430" y1="50" x2="430" y2="125" stroke="#475569" stroke-width="4" opacity="0.5" />
    <!-- Heavy anvil block -->
    <path d="M 310 125 L 490 125 L 470 150 L 330 150 Z" fill="url(#plateGrad)" stroke="#c084fc" stroke-width="2" filter="url(#glow)" />
    <!-- Pressure gauge indicators on block -->
    <circle cx="360" cy="138" r="4" fill="#ef4444" />
    <circle cx="440" cy="138" r="4" fill="#22c55e" />
    <line x1="390" y1="138" x2="410" y2="138" stroke="#ffffff" stroke-width="2" />
  </g>

  <!-- Bottom Plate -->
  <g class="plate-bottom">
    <!-- Pistons -->
    <line x1="400" y1="430" x2="400" y2="325" stroke="#8a9ca8" stroke-width="12" opacity="0.8" />
    <line x1="370" y1="400" x2="370" y2="325" stroke="#475569" stroke-width="4" opacity="0.5" />
    <line x1="430" y1="400" x2="430" y2="325" stroke="#475569" stroke-width="4" opacity="0.5" />
    <!-- Heavy anvil block -->
    <path d="M 310 325 L 490 325 L 470 300 L 330 300 Z" fill="url(#plateGrad)" stroke="#c084fc" stroke-width="2" filter="url(#glow)" />
    <!-- Structural supports -->
    <line x1="340" y1="312" x2="460" y2="312" stroke="#000000" stroke-width="1.5" opacity="0.4" />
  </g>

  <!-- Lateral compression brackets -->
  <g opacity="0.7">
    <!-- Left bracket -->
    <path d="M 210 180 L 250 180 L 250 270 L 210 270" fill="none" stroke="#8a9ca8" stroke-width="4" stroke-linejoin="round" />
    <line x1="210" y1="225" x2="250" y2="225" stroke="#c084fc" stroke-width="2" />
    <!-- Right bracket -->
    <path d="M 590 180 L 550 180 L 550 270 L 590 270" fill="none" stroke="#8a9ca8" stroke-width="4" stroke-linejoin="round" />
    <line x1="590" y1="225" x2="550" y2="225" stroke="#c084fc" stroke-width="2" />
  </g>

  <!-- Particles/Force lines shooting outwards from compression -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.8">
    <line x1="320" y1="225" x2="290" y2="225" stroke="#c084fc" stroke-width="2" />
    <line x1="480" y1="225" x2="510" y2="225" stroke="#c084fc" stroke-width="2" />
    <line x1="350" y1="175" x2="330" y2="155" />
    <line x1="450" y1="175" x2="470" y2="155" />
    <line x1="350" y1="275" x2="330" y2="295" />
    <line x1="450" y1="275" x2="470" y2="295" />
  </g>

  <!-- Monospace HUD Overlays -->
  <g transform="translate(40, 40)">
    <text x="0" y="0" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="2">EMOTIONAL PHASE 01: THE CORE UNDER PRESSURE</text>
    <text x="0" y="16" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="9">FORCE: 8.92e8 N/M² // COMPRESSION_RATIO: 1.42</text>
  </g>

  <g transform="translate(40, 410)">
    <text x="0" y="0" fill="#8a9ca8" font-family="'JetBrains Mono', monospace" font-size="9">SATURN INTEGRITY SYSTEM: SECURE // GRAV_INTENSIFIER: ACTIVE</text>
  </g>

  <g transform="translate(620, 410)">
    <text x="0" y="0" fill="#c084fc" font-family="'JetBrains Mono', monospace" font-size="9" letter-spacing="1">STATUS: COMPRESSED</text>
  </g>
</svg>
